name: Daily YouTube Analytics Fetch

on:
  schedule:
    # 毎朝 3:00 JST（= UTC 18:00 前日）に実行
    - cron: "0 18 * * *"
  workflow_dispatch:  # 手動実行も可能
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/daily_fetch.yml'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data.json をコミット・プッシュするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: echo "No extra dependencies needed (urllib only)"

      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 変更がなければスキップ
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update analytics data $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN --message="data update $(date -u +%Y-%m-%d)"
