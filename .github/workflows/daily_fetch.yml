name: Daily YouTube Analytics Fetch

on:
  schedule:
    # 毎朝 3:00 JST（= UTC 18:00 前日）に実行
    - cron: "0 18 * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data.json をコミット・プッシュするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          REFRESH_TOKEN:       ${{ secrets.REFRESH_TOKEN }}
          OAUTH_CLIENT_ID:     ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: python fetch.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 変更がなければスキップ
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update analytics data $(date -u +%Y-%m-%d)"
          git push
