<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHANNEL DESK — りいポーカーチャンネル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0E1A14;
  --panel:#16241C;
  --panel-2:#1B2E23;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --ink:#E8EDE9;
  --muted:#8FA396;
  --muted-2:#5E726A;
  --gold:#C9A227;
  --gold-soft:#E0C45C;
  --up:#5BD68A;
  --down:#E2706E;
  --radius:14px;
  --shadow:0 12px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(11,93,59,.25),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(201,162,39,.08),transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:"Noto Sans JP",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1200px;margin:0 auto;padding:20px 18px 80px}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 18px;margin-bottom:20px;
  background:linear-gradient(180deg,rgba(255,255,255,.03),transparent),var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);
}
.brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.brand .mark{
  width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(160deg,#1f3a2b,#0d1d15);
  border:1px solid var(--line-strong);color:var(--gold);font-size:20px;
}
.brand h1{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:.14em;font-size:18px;line-height:1}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.18em;margin-top:4px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
.status-dot.live{background:var(--up);box-shadow:0 0 6px var(--up)}
.updated{font-size:12px;color:var(--muted)}
.btn{
  font-size:13px;font-weight:500;font-family:"Noto Sans JP",sans-serif;
  color:var(--ink);background:var(--panel-2);border:1px solid var(--line-strong);
  border-radius:10px;padding:9px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:border-color .15s,background .15s;
}
.btn:hover{border-color:var(--gold);background:#22382c}

/* ── Loading ── */
#loadingState{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
#loadingState .spin{
  width:36px;height:36px;border:3px solid var(--line-strong);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#errorState{display:none;text-align:center;padding:60px 20px;color:var(--down)}
#mainContent{display:none}

/* ── KPI grid ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{
  background:linear-gradient(180deg,rgba(255,255,255,.035),transparent),var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px;position:relative;overflow:hidden;
}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.55}
.kpi .k-label{font-size:11.5px;color:var(--muted);letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi .k-val{font-family:"Oswald",sans-serif;font-weight:500;font-size:30px;line-height:1;letter-spacing:.01em}
.kpi .k-unit{font-size:13px;color:var(--muted);margin-left:4px;font-family:"Noto Sans JP",sans-serif}
.kpi .k-delta{margin-top:9px;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.kpi .k-delta.up{color:var(--up)}
.kpi .k-delta.down{color:var(--down)}
.kpi .k-delta.flat{color:var(--muted)}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card h3{
  font-family:"Oswald",sans-serif;font-weight:400;letter-spacing:.08em;font-size:13px;
  color:var(--muted);margin-bottom:14px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.chart-box{position:relative;height:260px}
.chart-box.tall{height:300px}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:500;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"Oswald",sans-serif}
tbody tr:hover{background:rgba(255,255,255,.025)}
.rank{color:var(--gold);font-family:"Oswald",sans-serif;width:30px}
.title-cell{max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thumb{
  width:60px;height:34px;border-radius:4px;object-fit:cover;
  background:var(--panel-2);border:1px solid var(--line);flex-shrink:0;
}
.video-info{display:flex;align-items:center;gap:10px}

/* ── Seg control ── */
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
.seg button{background:transparent;border:none;color:var(--muted);font-family:"Noto Sans JP",sans-serif;font-size:11px;padding:5px 12px;cursor:pointer}
.seg button.on{background:var(--gold);color:#1a1206;font-weight:700}

/* ── Period bar ── */
.period-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:14px;
}
.period-bar .seg{margin:0}
.period-bar .divider{width:1px;height:20px;background:var(--line-strong);flex-shrink:0}
.period-bar label{font-size:12px;color:var(--muted);white-space:nowrap}
.period-bar input[type=date]{
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line-strong);
  border-radius:7px;padding:5px 9px;font-family:"Noto Sans JP",sans-serif;font-size:12px;
  color-scheme:dark;
}
.period-bar .range-label{
  font-family:"Oswald",sans-serif;font-size:12px;color:var(--muted-2);
  letter-spacing:.04em;margin-left:auto;white-space:nowrap;
}

/* ── Notice ── */
.notice{
  background:rgba(201,162,39,.07);border:1px solid rgba(201,162,39,.2);
  border-radius:10px;padding:10px 14px;font-size:12px;color:var(--muted);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.notice .ic{color:var(--gold);font-size:14px}

.foot{color:var(--muted-2);font-size:11px;text-align:center;margin-top:30px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="mark">♠</div>
      <div>
        <h1>CHANNEL&nbsp;DESK</h1>
        <div class="sub">りいポーカーチャンネル</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <span class="updated" id="updatedLabel">読み込み中…</span>
    <button class="btn" onclick="loadData()">↻ 更新</button>
  </div>

  <!-- Loading -->
  <div id="loadingState">
    <div class="spin"></div>
    データを読み込んでいます…
  </div>

  <!-- Error -->
  <div id="errorState">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div id="errorMsg">データの読み込みに失敗しました</div>
  </div>

  <!-- Main -->
  <div id="mainContent">

    <div class="notice">
      <span class="ic">ℹ</span>
      データは毎朝3:00 JST（GitHub Actions）に自動更新されます。視聴時間・収益はAnalytics API未接続のため非表示。
    </div>

    <!-- KPI -->
    <div class="kpis" id="kpiGrid"></div>

    <!-- Period bar -->
    <div class="period-bar">
      <div class="seg" id="quickSeg">
        <button class="on" onclick="setQuick(7,this)">7日</button>
        <button onclick="setQuick(30,this)">30日</button>
        <button onclick="setQuick(90,this)">90日</button>
        <button onclick="setQuick(0,this)">全期間</button>
      </div>
      <div class="divider"></div>
      <label>A</label>
      <input type="date" id="dateFrom" onchange="onDateChange()">
      <label>〜</label>
      <input type="date" id="dateTo" onchange="onDateChange()">
      <button class="btn" id="compareBtn" onclick="toggleCompare()" style="margin-left:4px;font-size:11px;padding:5px 11px">比較</button>
      <span class="range-label" id="rangeLabel"></span>
    </div>
    <div class="period-bar" id="periodB" style="display:none;margin-top:8px">
      <label style="font-size:12px;color:var(--gold);font-weight:600;margin-right:4px">B</label>
      <input type="date" id="dateFromB" onchange="onDateChangeB()">
      <label>〜</label>
      <input type="date" id="dateToB" onchange="onDateChangeB()">
      <span class="range-label" id="rangeLabelB"></span>
    </div>
    <!-- Compare card -->
    <div class="card" id="compareCard" style="margin-bottom:14px;display:none">
      <h3><span class="dot" style="background:var(--gold)"></span>期間比較</h3>
      <div id="compareContent"></div>
    </div>

    <!-- Charts row -->
    <div class="grid2">
      <div class="card">
        <h3><span class="dot"></span>日次登録者増減</h3>
        <div class="chart-box"><canvas id="subChart"></canvas></div>
      </div>
      <div class="card">
        <h3><span class="dot" style="background:var(--up)"></span>日次再生数（差分）</h3>
        <div class="chart-box"><canvas id="viewChart"></canvas></div>
      </div>
    </div>


    <!-- Video ranking -->
    <div class="card" style="margin-bottom:16px">
      <h3>
        <span class="dot"></span>
        動画ランキング（再生数順）
        <span style="margin-left:auto;font-size:11px;color:var(--muted-2);text-transform:none;font-family:'Noto Sans JP',sans-serif" id="videoCount"></span>
      </h3>
      <div style="overflow-x:auto">
        <table id="videoTable">
          <thead>
            <tr>
              <th style="width:30px">#</th>
              <th>動画</th>
              <th class="num">再生数</th>
              <th class="num">高評価</th>
              <th class="num">コメント</th>
              <th class="num">公開日</th>
            </tr>
          </thead>
          <tbody id="videoBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /mainContent -->

  <div class="foot" id="footNote"></div>
</div>

<script>
// Netlify: 同一サイトの /data.json を取得。ローカルではGitHub rawにフォールバック。
const DATA_URL = window.location.protocol === 'file:'
  ? "https://raw.githubusercontent.com/ytpokerguild-netizen/channel-desk-data/main/data.json"
  : "/data.json";

let G = null; // global data
let subChart = null, viewChart = null;
let filterFrom = null, filterTo = null; // ISO date strings or null
let compareMode = false;
let filterFromB = null, filterToB = null;

// ── フォーマット ──
function fmt(n){
  if(n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '万';
  return n.toLocaleString('ja-JP');
}
function fmtFull(n){ return n.toLocaleString('ja-JP'); }
function fmtDate(s){ return s.replace(/-/g,'/'); }

// ── データ読み込み ──
async function loadData(){
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';

  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if(!r.ok) throw new Error('HTTP ' + r.status);
    G = await r.json();
    render();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('updatedLabel').textContent = '更新: ' + G.meta.data_through.replace(/-/g, '/');
    document.getElementById('footNote').textContent = 'channel-desk-data · ' + G.meta.channel_id + ' · ' + G.meta.fetched_at.slice(0,10);
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'データの読み込みに失敗しました: ' + e.message;
    document.getElementById('statusDot').className = 'status-dot';
  }
}

// ── 週次ヘルパー ──
function entryNDaysAgo(daily, latestDate, n){
  const d = new Date(latestDate + 'T00:00:00');
  d.setDate(d.getDate() - n);
  const dstr = d.toISOString().slice(0, 10);
  return [...daily].reverse().find(e => e.date <= dstr) || null;
}

// ── KPI ──
function renderKPI(){
  const daily  = allDaily();
  const latest = daily[daily.length-1];
  const prev   = daily.length >= 2 ? daily[daily.length-2] : null;

  // 7日前エントリ
  const e7 = entryNDaysAgo(daily, latest.date, 7);

  // 週間再生数（スナップショット差分）
  const weekViews = e7 ? Math.max(0, latest.total_views - e7.total_views) : null;
  const weekViewsPrev = (e7 && daily.length >= 2) ? (() => {
    const e14 = entryNDaysAgo(daily, e7.date, 7);
    return e14 ? Math.max(0, e7.total_views - e14.total_views) : null;
  })() : null;

  // 登録者増加率（週）
  const weekSubDiff = e7 ? latest.subscribers - e7.subscribers : null;
  const weekSubRate = (e7 && e7.subscribers) ? (weekSubDiff / e7.subscribers * 100) : null;

  const cards = [
    {
      label:'登録者数', icon:'👥',
      val: fmtFull(latest.subscribers), unit:'人',
      delta: prev ? latest.subscribers - prev.subscribers : null,
      suffix: '前日比'
    },
    {
      label:'登録者増加率（週）', icon:'📈',
      val: weekSubRate !== null ? (weekSubRate >= 0 ? '+' : '') + weekSubRate.toFixed(2) : '—',
      unit: weekSubRate !== null ? '%' : '',
      sub: weekSubDiff !== null ? '直近7日 ' + (weekSubDiff >= 0 ? '+' : '') + weekSubDiff.toLocaleString() + '人' : '',
      delta: null
    },
    {
      label:'週間再生数', icon:'▶',
      val: weekViews !== null ? fmt(weekViews) : '—', unit:'',
      sub: weekViews !== null ? fmtFull(weekViews) + ' 回（直近7日）' : 'データ不足',
      delta: (weekViews !== null && weekViewsPrev !== null) ? weekViews - weekViewsPrev : null,
      suffix: '前週比'
    },
    {
      label:'動画本数', icon:'🎬',
      val: latest.video_count.toLocaleString(), unit:'本',
      delta: null
    },
    {
      label:'収集日数', icon:'📅',
      val: [...new Set(daily.map(d=>d.date))].length, unit:'日',
      sub: daily[0].date.replace(/-/g,'/') + ' 〜',
      delta: null
    },
  ];

  // 動画統計 from videos
  if(G.videos.length > 0){
    const totalV = G.videos.reduce((a,v)=>a+v.views,0);
    const totalL = G.videos.reduce((a,v)=>a+v.likes,0);
    cards.push({label:'動画合計再生', icon:'🔢', val:fmt(totalV), unit:'', sub:fmtFull(totalV)+'回', delta:null});
    cards.push({label:'動画合計高評価', icon:'👍', val:fmt(totalL), unit:'', delta:null});
  }

  const html = cards.map(c=>{
    let deltaHtml = '';
    if(c.delta !== null){
      const cls = c.delta > 0 ? 'up' : c.delta < 0 ? 'down' : 'flat';
      const sign = c.delta > 0 ? '+' : '';
      deltaHtml = `<div class="k-delta ${cls}">${sign}${c.delta.toLocaleString()} <span style="color:var(--muted-2);font-weight:400">${c.suffix||''}</span></div>`;
    }
    const subHtml = c.sub ? `<div style="font-size:11px;color:var(--muted-2);margin-top:4px">${c.sub}</div>` : '';
    return `
      <div class="kpi">
        <div class="k-label">${c.icon} ${c.label}</div>
        <div class="k-val">${c.val}<span class="k-unit">${c.unit}</span></div>
        ${subHtml}
        ${deltaHtml}
      </div>`;
  }).join('');

  document.getElementById('kpiGrid').innerHTML = html;
}

// ── チャート共通設定 ──
const chartDefaults = {
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{display:false}, tooltip:{
    backgroundColor:'#1B2E23', borderColor:'rgba(255,255,255,.12)', borderWidth:1,
    titleColor:'#8FA396', bodyColor:'#E8EDE9', padding:10,
    callbacks:{ label: ctx => ' ' + fmtFull(ctx.raw) }
  }},
  scales:{
    x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#5E726A',font:{size:10},maxTicksLimit:8} },
    y:{ grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#5E726A',font:{size:10}, callback:v=>fmt(v)} }
  }
};

// ── 期間フィルター ──
// 同日複数エントリを日付でdedup（最後のエントリを使用）
function dedupeByDate(arr){
  const map = new Map();
  arr.forEach(d => map.set(d.date, d));
  return [...map.values()].sort((a,b) => a.date.localeCompare(b.date));
}

function allDaily(){
  return dedupeByDate(G.daily.filter(d => d.subscribers > 0 || d.total_views > 0));
}

function filteredDaily(){
  let data = allDaily();
  if(filterFrom) data = data.filter(d => d.date >= filterFrom);
  if(filterTo)   data = data.filter(d => d.date <= filterTo);
  return data;
}

// N日前のISO日付を返す（カレンダー日付ベース）
function dateNDaysAgo(baseDate, n){
  const d = new Date(baseDate + 'T00:00:00');
  d.setDate(d.getDate() - n + 1);
  return d.toISOString().slice(0, 10);
}

function updateRangeLabel(){
  const data = filteredDaily();
  const el = document.getElementById('rangeLabel');
  if(!data.length){ el.textContent = ''; return; }
  el.textContent = data[0].date.replace(/-/g,'/') + ' 〜 ' + data[data.length-1].date.replace(/-/g,'/') + '（' + data.length + '日）';
}

function setQuick(days, btn){
  document.querySelectorAll('#quickSeg button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const all = allDaily();
  if(days === 0 || !all.length){
    filterFrom = null; filterTo = null;
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
  } else {
    const to   = all[all.length-1].date;
    const from = dateNDaysAgo(to, days);
    filterFrom = from; filterTo = to;
    document.getElementById('dateFrom').value = from;
    document.getElementById('dateTo').value   = to;
  }
  renderCharts();
}

function onDateChange(){
  filterFrom = document.getElementById('dateFrom').value || null;
  filterTo   = document.getElementById('dateTo').value   || null;
  document.querySelectorAll('#quickSeg button').forEach(b=>b.classList.remove('on'));
  renderCharts();
}

function initPeriodBar(){
  const all = allDaily();
  if(!all.length) return;
  const to = all[all.length-1].date;

  // データが30件未満なら全期間を自動選択
  if(all.length < 30){
    filterFrom = null; filterTo = null;
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
    document.querySelectorAll('#quickSeg button').forEach(b=>b.classList.remove('on'));
    document.querySelector('#quickSeg button:nth-child(4)').classList.add('on'); // 全期間
  } else {
    const from = dateNDaysAgo(to, 30);
    filterFrom = from; filterTo = to;
    document.getElementById('dateFrom').value = from;
    document.getElementById('dateTo').value   = to;
    document.querySelectorAll('#quickSeg button').forEach(b=>b.classList.remove('on'));
    document.querySelector('#quickSeg button:nth-child(2)').classList.add('on'); // 30日
  }
}

// ── グラフ描画 ──
function renderCharts(){
  renderSubChart();
  renderViewChart();
  renderCompare();
  updateRangeLabel();
  updateRangeLabelB();
}

function filteredDailyB(){
  let data = allDaily();
  if(filterFromB) data = data.filter(d => d.date >= filterFromB);
  if(filterToB)   data = data.filter(d => d.date <= filterToB);
  return data;
}

function renderSubChart(){
  const dataA = filteredDaily();
  if(dataA.length < 2){ if(subChart){ subChart.destroy(); subChart=null; } return; }

  const valsA   = dataA.slice(1).map((d,i) => d.subscribers - dataA[i].subscribers);
  let chartLabels = dataA.slice(1).map(d => d.date.slice(5));

  let datasets = [{
    label:'期間 A',
    data: valsA,
    backgroundColor: valsA.map(v => v >= 0 ? 'rgba(201,162,39,.6)' : 'rgba(226,112,110,.6)'),
    borderColor:     valsA.map(v => v >= 0 ? 'rgba(201,162,39,.9)' : 'rgba(226,112,110,.9)'),
    borderWidth:1, borderRadius:3,
  }];

  if(compareMode && filterFromB){
    const dataB = filteredDailyB();
    if(dataB.length >= 2){
      const valsB = dataB.slice(1).map((d,i) => d.subscribers - dataB[i].subscribers);
      const maxLen = Math.max(valsA.length, valsB.length);
      chartLabels = Array.from({length:maxLen}, (_,i) => `Day ${i+1}`);
      datasets[0].data = Array.from({length:maxLen}, (_,i) => valsA[i] ?? null);
      datasets.push({
        label:'期間 B',
        data: Array.from({length:maxLen}, (_,i) => valsB[i] ?? null),
        backgroundColor: valsB.map(v => v >= 0 ? 'rgba(91,214,138,.6)' : 'rgba(226,112,110,.4)'),
        borderColor:     valsB.map(v => v >= 0 ? 'rgba(91,214,138,.9)' : 'rgba(226,112,110,.7)'),
        borderWidth:1, borderRadius:3,
      });
    }
  }

  if(subChart) subChart.destroy();
  subChart = new Chart(document.getElementById('subChart'), {
    type:'bar',
    data:{ labels:chartLabels, datasets },
    options:{ ...chartDefaults,
      plugins:{ ...chartDefaults.plugins,
        legend:{ display: compareMode && datasets.length > 1, labels:{ color:'#8FA396', font:{size:11} } },
        tooltip:{ ...chartDefaults.plugins.tooltip,
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${(ctx.raw??0) >= 0 ? '+' : ''}${fmtFull(ctx.raw??0)}人` }
        }
      }
    }
  });
}

// ── 統合ビューデータ（analytics_daily_views 2025 + スナップショット差分 2026）──
function allViewData(){
  const map = new Map();
  (G.analytics_daily_views || []).forEach(d => {
    if(d.views > 0) map.set(d.date, {date:d.date, views:d.views});
  });
  const daily = allDaily();
  for(let i=1; i<daily.length; i++){
    const delta = Math.max(0, daily[i].total_views - daily[i-1].total_views);
    map.set(daily[i].date, {date:daily[i].date, views:delta});
  }
  return [...map.values()].sort((a,b) => a.date.localeCompare(b.date));
}

function filteredViewData(){
  let d = allViewData();
  if(filterFrom) d = d.filter(v => v.date >= filterFrom);
  if(filterTo)   d = d.filter(v => v.date <= filterTo);
  return d;
}

function filteredViewDataB(){
  let d = allViewData();
  if(filterFromB) d = d.filter(v => v.date >= filterFromB);
  if(filterToB)   d = d.filter(v => v.date <= filterToB);
  return d;
}

function renderViewChart(){
  const dataA = filteredViewData();
  if(!dataA.length){ if(viewChart){ viewChart.destroy(); viewChart=null; } return; }

  let chartLabels = dataA.map(d => d.date.slice(5));
  let datasets = [{
    label:'期間 A',
    data: dataA.map(d => d.views),
    backgroundColor:'rgba(91,214,138,.45)',
    borderColor:'rgba(91,214,138,.8)',
    borderWidth:1, borderRadius:2,
  }];

  if(compareMode && filterFromB){
    const dataB = filteredViewDataB();
    if(dataB.length){
      const maxLen = Math.max(dataA.length, dataB.length);
      chartLabels = Array.from({length:maxLen}, (_,i) => `Day ${i+1}`);
      datasets[0].data = Array.from({length:maxLen}, (_,i) => dataA[i]?.views ?? null);
      datasets.push({
        label:'期間 B',
        data: Array.from({length:maxLen}, (_,i) => dataB[i]?.views ?? null),
        backgroundColor:'rgba(201,162,39,.45)',
        borderColor:'rgba(201,162,39,.8)',
        borderWidth:1, borderRadius:2,
      });
    }
  }

  if(viewChart) viewChart.destroy();
  viewChart = new Chart(document.getElementById('viewChart'), {
    type:'bar',
    data:{ labels:chartLabels, datasets },
    options:{ ...chartDefaults,
      plugins:{ ...chartDefaults.plugins,
        legend:{ display: compareMode && datasets.length > 1, labels:{ color:'#8FA396', font:{size:11} } },
        tooltip:{ ...chartDefaults.plugins.tooltip,
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${fmtFull(ctx.raw??0)}回` }
        }
      }
    }
  });
}

// ── 動画テーブル ──
function renderVideoTable(){
  const videos = G.videos;
  document.getElementById('videoCount').textContent = videos.length + '本';

  const rows = videos.slice(0,100).map((v,i)=>{
    const thumbUrl = `https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg`;
    return `
      <tr>
        <td class="rank">${i+1}</td>
        <td>
          <div class="video-info">
            <img class="thumb" src="${thumbUrl}" alt="" loading="lazy" onerror="this.style.display='none'">
            <div>
              <div class="title-cell" title="${v.title.replace(/"/g,'&quot;')}">${v.title}</div>
              <div style="font-size:11px;color:var(--muted-2);margin-top:2px">${fmtDate(v.published_at)}</div>
            </div>
          </div>
        </td>
        <td class="num">${fmtFull(v.views)}</td>
        <td class="num">${fmtFull(v.likes)}</td>
        <td class="num">${fmtFull(v.comments)}</td>
        <td class="num" style="white-space:nowrap">${fmtDate(v.published_at)}</td>
      </tr>`;
  }).join('');

  document.getElementById('videoBody').innerHTML = rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">動画データなし</td></tr>';
}

// ── 比較モード ──
function toggleCompare(){
  compareMode = !compareMode;
  const btn = document.getElementById('compareBtn');
  const periodB = document.getElementById('periodB');
  if(compareMode){
    btn.style.borderColor = 'var(--gold)';
    btn.style.background  = 'rgba(201,162,39,.15)';
    periodB.style.display = 'flex';
    // 期間Bを期間Aの直前の同じ日数に自動設定
    if(filterFrom && filterTo){
      const daysA = Math.round((new Date(filterTo) - new Date(filterFrom)) / 86400000) + 1;
      const toB   = new Date(filterFrom + 'T00:00:00');
      toB.setDate(toB.getDate() - 1);
      const fromB = new Date(toB);
      fromB.setDate(fromB.getDate() - daysA + 1);
      filterFromB = fromB.toISOString().slice(0,10);
      filterToB   = toB.toISOString().slice(0,10);
      document.getElementById('dateFromB').value = filterFromB;
      document.getElementById('dateToB').value   = filterToB;
    }
  } else {
    btn.style.borderColor = '';
    btn.style.background  = '';
    periodB.style.display = 'none';
    document.getElementById('compareCard').style.display = 'none';
    filterFromB = null; filterToB = null;
  }
  renderCharts();
}

function onDateChangeB(){
  filterFromB = document.getElementById('dateFromB').value || null;
  filterToB   = document.getElementById('dateToB').value   || null;
  updateRangeLabelB();
  renderCharts();
}

function updateRangeLabelB(){
  const el = document.getElementById('rangeLabelB');
  if(!el) return;
  if(!filterFromB && !filterToB){ el.textContent=''; return; }
  const from = filterFromB || '';
  const to   = filterToB   || '';
  el.textContent = from.replace(/-/g,'/') + ' 〜 ' + to.replace(/-/g,'/');
}

function renderCompare(){
  const card = document.getElementById('compareCard');
  if(!compareMode || !filterFromB){ card.style.display='none'; return; }
  card.style.display = 'block';

  const avA = filteredViewData();
  const avB = filteredViewDataB();
  const dA  = filteredDaily();
  const dB  = filteredDailyB();

  const totalA = avA.reduce((s,d) => s+d.views, 0);
  const totalB = avB.reduce((s,d) => s+d.views, 0);
  const avgA   = avA.length ? Math.round(totalA/avA.length) : 0;
  const avgB   = avB.length ? Math.round(totalB/avB.length) : 0;
  const subA   = dA.length >= 2 ? dA[dA.length-1].subscribers - dA[0].subscribers : null;
  const subB   = dB.length >= 2 ? dB[dB.length-1].subscribers - dB[0].subscribers : null;

  const pA = (filterFrom||'').replace(/-/g,'/') + '〜' + (filterTo||'').replace(/-/g,'/');
  const pB = (filterFromB||'').replace(/-/g,'/') + '〜' + (filterToB||'').replace(/-/g,'/');

  function diffTd(a, b, fmtFn){
    if(a===null||b===null) return '<td class="num" style="color:var(--muted)">—</td>';
    const d = b - a;
    const col = d > 0 ? 'var(--up)' : d < 0 ? 'var(--down)' : 'var(--muted)';
    const sign = d > 0 ? '+' : '';
    return `<td class="num" style="color:${col}">${sign}${fmtFn(d)}</td>`;
  }

  document.getElementById('compareContent').innerHTML = `
    <table>
      <thead><tr>
        <th>指標</th>
        <th class="num" style="color:var(--up)">A&nbsp;<span style="font-size:10px;font-weight:400;color:var(--muted)">${pA}</span></th>
        <th class="num" style="color:var(--gold)">B&nbsp;<span style="font-size:10px;font-weight:400;color:var(--muted)">${pB}</span></th>
        <th class="num">B−A</th>
      </tr></thead>
      <tbody>
        <tr><td>日数</td><td class="num">${avA.length}日</td><td class="num">${avB.length}日</td><td class="num" style="color:var(--muted)">—</td></tr>
        <tr><td>総再生数</td><td class="num">${fmtFull(totalA)}回</td><td class="num">${fmtFull(totalB)}回</td>${diffTd(totalA,totalB,n=>fmtFull(Math.abs(n))+'回')}</tr>
        <tr><td>平均日次再生</td><td class="num">${fmtFull(avgA)}回</td><td class="num">${fmtFull(avgB)}回</td>${diffTd(avgA,avgB,n=>fmtFull(Math.abs(n))+'回')}</tr>
        <tr><td>登録者増減</td>
          <td class="num">${subA!==null?(subA>=0?'+':'')+subA.toLocaleString()+'人':'—'}</td>
          <td class="num">${subB!==null?(subB>=0?'+':'')+subB.toLocaleString()+'人':'—'}</td>
          ${subA!==null&&subB!==null?diffTd(subA,subB,n=>Math.abs(n).toLocaleString()+'人'):'<td class="num" style="color:var(--muted)">—</td>'}
        </tr>
      </tbody>
    </table>`;
}

// ── メインレンダリング ──
function render(){
  renderKPI();
  initPeriodBar();
  renderCharts();
  renderVideoTable();
}

// ── 起動 ──
loadData();
</script>
