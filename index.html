<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHANNEL DESK — りいポーカーチャンネル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0E1A14;
  --panel:#16241C;
  --panel-2:#1B2E23;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --ink:#E8EDE9;
  --muted:#8FA396;
  --muted-2:#5E726A;
  --gold:#C9A227;
  --gold-soft:#E0C45C;
  --up:#5BD68A;
  --down:#E2706E;
  --radius:14px;
  --shadow:0 12px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(11,93,59,.25),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(201,162,39,.08),transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:"Noto Sans JP",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:20px 18px 80px}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:12px 16px;margin-bottom:16px;
  background:linear-gradient(180deg,rgba(255,255,255,.03),transparent),var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);
}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto}
.brand .mark{
  width:34px;height:34px;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(160deg,#1f3a2b,#0d1d15);
  border:1px solid var(--line-strong);color:var(--gold);font-size:18px;
}
.brand h1{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:.14em;font-size:17px;line-height:1}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
.status-dot.live{background:var(--up);box-shadow:0 0 6px var(--up)}
.updated{font-size:12px;color:var(--muted)}
.btn{
  font-size:12px;font-weight:500;font-family:"Noto Sans JP",sans-serif;
  color:var(--ink);background:var(--panel-2);border:1px solid var(--line-strong);
  border-radius:9px;padding:7px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:border-color .15s,background .15s;
}
.btn:hover{border-color:var(--gold);background:#22382c}
.btn.active{border-color:var(--gold);background:rgba(201,162,39,.15);color:var(--gold)}

/* ── Loading ── */
#loadingState{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
#loadingState .spin{
  width:34px;height:34px;border:3px solid var(--line-strong);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#errorState{display:none;text-align:center;padding:60px 20px;color:var(--down)}
#mainContent{display:none}

/* ── Period bar ── */
.period-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:12px;
}
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
.seg button{
  background:transparent;border:none;color:var(--muted);
  font-family:"Noto Sans JP",sans-serif;font-size:11.5px;padding:6px 13px;cursor:pointer;
  transition:background .12s,color .12s;
}
.seg button.on{background:var(--panel-2);color:var(--ink);font-weight:600}
.period-bar .divider{width:1px;height:18px;background:var(--line-strong);flex-shrink:0}
.period-bar label{font-size:12px;color:var(--muted);white-space:nowrap}
.period-bar input[type=date]{
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line-strong);
  border-radius:7px;padding:5px 8px;font-family:"Noto Sans JP",sans-serif;font-size:12px;
  color-scheme:dark;
}
.range-info{font-size:11.5px;color:var(--muted-2);margin-left:auto;white-space:nowrap}

/* ── Metric tile row ── */
.metric-tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1px;
  background:var(--line-strong);
  border:1px solid var(--line-strong);
  border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
  overflow:hidden;
}
.metric-tile{
  background:var(--panel);
  padding:16px 20px;
  cursor:pointer;
  border-bottom:3px solid transparent;
  transition:background .15s,border-color .15s;
  position:relative;
}
.metric-tile:hover{background:var(--panel-2)}
.metric-tile.active{border-bottom-color:var(--gold);background:var(--panel-2)}
.tile-label{font-size:11.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:6px}
.tile-val{font-family:"Oswald",sans-serif;font-size:26px;font-weight:400;line-height:1}
.tile-unit{font-size:12px;color:var(--muted);margin-left:3px}
.tile-change{margin-top:5px;font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:4px}
.tile-change.up{color:var(--up)}
.tile-change.down{color:var(--down)}
.tile-change.flat{color:var(--muted)}

/* ── Main chart card ── */
.chart-card{
  background:var(--panel);
  border:1px solid var(--line-strong);
  border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  padding:20px 20px 16px;
  margin-bottom:14px;
}
.chart-title{font-size:11.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.chart-title .ct-label{font-weight:600;color:var(--ink)}
.chart-nodata{display:none;text-align:center;padding:60px 0;color:var(--muted-2);font-size:13px}
.data-gap-note{font-size:10.5px;color:var(--muted-2);margin-top:8px}
.chart-box-main{position:relative;height:300px}

/* ── Compare strip ── */
.compare-strip{
  background:var(--panel);border:1px solid var(--line-strong);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;
}
.compare-strip table{width:100%;border-collapse:collapse;font-size:13px}
.compare-strip th,.compare-strip td{padding:7px 10px;border-bottom:1px solid var(--line)}
.compare-strip th{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.compare-strip td.num,.compare-strip th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"Oswald",sans-serif}

/* ── Overview bar ── */
.overview-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px;background:var(--line-strong);
  border:1px solid var(--line-strong);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px;
}
.ov-item{background:var(--panel);padding:13px 16px}
.ov-label{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.ov-val{font-family:"Oswald",sans-serif;font-size:20px;font-weight:400;line-height:1}
.ov-sub{font-size:10.5px;color:var(--muted-2);margin-top:3px}

/* ── Video table ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card h3{
  font-family:"Oswald",sans-serif;font-weight:400;letter-spacing:.08em;font-size:13px;
  color:var(--muted);margin-bottom:14px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:500;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"Oswald",sans-serif}
tbody tr:hover{background:rgba(255,255,255,.025)}
.rank{color:var(--gold);font-family:"Oswald",sans-serif;width:30px}
.title-cell{max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.video-info{display:flex;align-items:center;gap:10px}
.thumb{width:60px;height:34px;border-radius:4px;object-fit:cover;background:var(--panel-2);border:1px solid var(--line);flex-shrink:0}

.foot{color:var(--muted-2);font-size:11px;text-align:center;margin-top:30px;letter-spacing:.04em}

/* ── Legend ── */
.chart-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
.legend-dot{width:10px;height:3px;border-radius:2px}
</style>
</head>
<body>
<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="mark">♠</div>
      <div>
        <h1>CHANNEL&nbsp;DESK</h1>
        <div class="sub">りいポーカーチャンネル</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <span class="updated" id="updatedLabel">読み込み中…</span>
    <button class="btn" onclick="loadData()">↻ 更新</button>
  </div>

  <div id="loadingState"><div class="spin"></div>データを読み込んでいます…</div>
  <div id="errorState"><div style="font-size:28px;margin-bottom:10px">⚠️</div><div id="errorMsg">読み込み失敗</div></div>

  <div id="mainContent">

    <!-- Period bar -->
    <div class="period-bar">
      <div class="seg" id="quickSeg">
        <button onclick="setQuick(7,this)">7日</button>
        <button onclick="setQuick(28,this)">28日</button>
        <button onclick="setQuick(90,this)">90日</button>
        <button onclick="setQuick(365,this)">365日</button>
        <button onclick="setQuick(0,this)">全期間</button>
      </div>
      <div class="divider"></div>
      <label>A</label>
      <input type="date" id="dateFrom" onchange="onDateChange()">
      <label>〜</label>
      <input type="date" id="dateTo" onchange="onDateChange()">
      <button class="btn" id="compareBtn" onclick="toggleCompare()">比較</button>
      <span class="range-info" id="rangeInfo"></span>
    </div>

    <!-- Period B (compare) -->
    <div class="period-bar" id="periodBBar" style="display:none">
      <label style="color:var(--gold);font-weight:600;min-width:10px">B</label>
      <input type="date" id="dateFromB" onchange="onDateChangeB()">
      <label>〜</label>
      <input type="date" id="dateToB" onchange="onDateChangeB()">
      <span class="range-info" id="rangeInfoB"></span>
    </div>

    <!-- Metric tiles -->
    <div class="metric-tiles" id="metricTiles"></div>

    <!-- Main chart -->
    <div class="chart-card">
      <div class="chart-title"><span class="ct-label" id="chartLabel">再生数</span><span id="chartSubLabel" style="color:var(--muted-2)"></span></div>
      <div class="chart-box-main">
        <canvas id="mainChart"></canvas>
        <div class="chart-nodata" id="chartNoData">このperiodのデータがありません</div>
      </div>
      <div class="chart-legend" id="chartLegend"></div>
      <div class="data-gap-note" id="dataGapNote"></div>
    </div>

    <!-- Compare table -->
    <div class="compare-strip" id="compareStrip" style="display:none">
      <div id="compareContent"></div>
    </div>

    <!-- Overview bar -->
    <div class="overview-bar" id="overviewBar"></div>

    <!-- Video ranking -->
    <div class="card">
      <h3>
        <span class="dot"></span>
        動画ランキング（再生数順）
        <span style="margin-left:auto;font-size:11px;color:var(--muted-2);text-transform:none;font-family:'Noto Sans JP',sans-serif" id="videoCount"></span>
      </h3>
      <div style="overflow-x:auto">
        <table id="videoTable">
          <thead>
            <tr>
              <th style="width:28px">#</th>
              <th>動画</th>
              <th class="num">再生数</th>
              <th class="num">高評価</th>
              <th class="num">コメント</th>
              <th class="num">公開日</th>
            </tr>
          </thead>
          <tbody id="videoBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /mainContent -->

  <div class="foot" id="footNote"><!-- analytics: 2025-01-01 to 2026-06-27 --></div>
</div>

<script>
const DATA_URL = window.location.protocol === 'file:'
  ? "https://raw.githubusercontent.com/ytpokerguild-netizen/channel-desk-data/main/data.json"
  : "/data.json";

let G = null;
let mainChart = null;
let filterFrom = null, filterTo = null;
let compareMode = false;
let filterFromB = null, filterToB = null;
let activeMetric = 'views'; // 'views' | 'sub_delta' | 'subscribers'

// ── フォーマット ──
function fmt(n){
  if(n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '万';
  return n.toLocaleString('ja-JP');
}
function fmtFull(n){ return (n??0).toLocaleString('ja-JP'); }
function fmtDate(s){ return s.replace(/-/g,'/'); }
function sign(n){ return n > 0 ? '+' : ''; }

// ── データ読み込み ──
async function loadData(){
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if(!r.ok) throw new Error('HTTP ' + r.status);
    G = await r.json();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    render();
    requestAnimationFrame(() => { if(mainChart) mainChart.update(); });
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('updatedLabel').textContent = '更新: ' + G.meta.data_through.replace(/-/g,'/');
    document.getElementById('footNote').textContent = 'channel-desk-data · ' + G.meta.channel_id + ' · ' + G.meta.data_through;
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = '読み込み失敗: ' + e.message;
    document.getElementById('statusDot').className = 'status-dot';
  }
}

// ── データ処理ヘルパー ──
function dedupeByDate(arr){
  const map = new Map();
  arr.forEach(d => map.set(d.date, d));
  return [...map.values()].sort((a,b) => a.date.localeCompare(b.date));
}

function allDaily(){
  return dedupeByDate(G.daily.filter(d => d.subscribers > 0 || d.total_views > 0));
}

function allViewData(){
  const map = new Map();
  (G.analytics_daily_views || []).forEach(d => {
    if(d.views > 0) map.set(d.date, {date:d.date, views:d.views});
  });
  const daily = allDaily();
  for(let i = 1; i < daily.length; i++){
    const delta = Math.max(0, daily[i].total_views - daily[i-1].total_views);
    map.set(daily[i].date, {date:daily[i].date, views:delta});
  }
  return [...map.values()].sort((a,b) => a.date.localeCompare(b.date));
}

function filteredData(from, to){
  const daily = allDaily().filter(d => (!from || d.date >= from) && (!to || d.date <= to));
  const views  = allViewData().filter(d => (!from || d.date >= from) && (!to || d.date <= to));
  return { daily, views };
}

function dateNDaysAgo(baseDate, n){
  const d = new Date(baseDate + 'T00:00:00');
  d.setDate(d.getDate() - n + 1);
  return d.toISOString().slice(0,10);
}

// ── メトリクス計算 ──
function calcMetrics(from, to){
  const {daily, views} = filteredData(from, to);
  const totalViews = views.reduce((s,d) => s + d.views, 0);
  const subFirst = daily.length ? daily[0].subscribers : null;
  const subLast  = daily.length ? daily[daily.length-1].subscribers : null;
  const subDelta = (subFirst !== null && subLast !== null) ? subLast - subFirst : null;
  const subLatest = subLast;
  return { totalViews, subDelta, subLatest, days: views.length };
}

// ── 期間設定 ──
function setQuick(days, btn){
  document.querySelectorAll('#quickSeg button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const all = allViewData();
  if(!all.length) return;
  const to = all[all.length-1].date;
  if(days === 0){
    filterFrom = null; filterTo = null;
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
  } else {
    filterFrom = dateNDaysAgo(to, days);
    filterTo   = to;
    document.getElementById('dateFrom').value = filterFrom;
    document.getElementById('dateTo').value   = filterTo;
  }
  renderAll();
}

function onDateChange(){
  filterFrom = document.getElementById('dateFrom').value || null;
  filterTo   = document.getElementById('dateTo').value   || null;
  document.querySelectorAll('#quickSeg button').forEach(b => b.classList.remove('on'));
  renderAll();
}

function onDateChangeB(){
  filterFromB = document.getElementById('dateFromB').value || null;
  filterToB   = document.getElementById('dateToB').value   || null;
  renderAll();
}

function toggleCompare(){
  compareMode = !compareMode;
  const btn = document.getElementById('compareBtn');
  const bar = document.getElementById('periodBBar');
  if(compareMode){
    btn.classList.add('active');
    bar.style.display = 'flex';
    // 期間Aと同じ日数を前にずらして期間B自動設定
    if(filterFrom && filterTo){
      const msA = new Date(filterTo) - new Date(filterFrom);
      const days = Math.round(msA / 86400000) + 1;
      const toB   = new Date(filterFrom + 'T00:00:00');
      toB.setDate(toB.getDate() - 1);
      const fromB = new Date(toB);
      fromB.setDate(fromB.getDate() - days + 1);
      filterFromB = fromB.toISOString().slice(0,10);
      filterToB   = toB.toISOString().slice(0,10);
      document.getElementById('dateFromB').value = filterFromB;
      document.getElementById('dateToB').value   = filterToB;
    }
  } else {
    btn.classList.remove('active');
    bar.style.display = 'none';
    filterFromB = null; filterToB = null;
    document.getElementById('compareStrip').style.display = 'none';
  }
  renderAll();
}

function initPeriod(){
  filterFrom = null; filterTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value   = '';
  document.querySelector('#quickSeg button:nth-child(5)').classList.add('on'); // 全期間
}

function setMetric(key){
  activeMetric = key;
  renderAll();
}

// ── メトリクスタイル描画 ──
function renderTiles(){
  const mA = calcMetrics(filterFrom, filterTo);
  const mB = compareMode ? calcMetrics(filterFromB, filterToB) : null;

  const metrics = [
    {
      key:'views', label:'再生数',
      valA: mA.totalViews, unitA:'回',
      valB: mB ? mB.totalViews : null,
      fmt: n => fmt(n)
    },
    {
      key:'sub_delta', label:'登録者増減',
      valA: mA.subDelta, unitA:'人',
      valB: mB ? mB.subDelta : null,
      fmt: n => (n >= 0 ? '+' : '') + fmtFull(n)
    },
    {
      key:'subscribers', label:'登録者数',
      valA: mA.subLatest, unitA:'人',
      valB: mB ? mB.subLatest : null,
      fmt: n => fmtFull(n)
    }
  ];

  const html = metrics.map(m => {
    const isActive = m.key === activeMetric;
    const valStr = m.valA !== null ? m.fmt(m.valA) : '—';

    let changeHtml = '';
    if(m.valB !== null && m.valA !== null){
      const diff = m.valA - m.valB;
      const pct  = m.valB !== 0 ? (diff / Math.abs(m.valB) * 100) : null;
      const cls  = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
      const diffStr = (diff >= 0 ? '+' : '') + fmtFull(diff);
      const pctStr  = pct !== null ? ' (' + (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%)' : '';
      changeHtml = `<div class="tile-change ${cls}">${diffStr}${m.unitA}${pctStr} vs B</div>`;
    } else if(!compareMode){
      // 期間変化なし表示（前期間比は計算しない）
      changeHtml = `<div class="tile-change flat" style="color:var(--muted-2);font-size:10.5px">${filterFrom ? fmtDate(filterFrom)+'〜'+fmtDate(filterTo||'') : '全期間'}</div>`;
    }

    return `
      <div class="metric-tile ${isActive ? 'active' : ''}" onclick="setMetric('${m.key}')">
        <div class="tile-label">${m.label}</div>
        <div class="tile-val">${valStr}<span class="tile-unit">${m.unitA}</span></div>
        ${changeHtml}
      </div>`;
  }).join('');

  document.getElementById('metricTiles').innerHTML = html;
}

// ── メインチャート描画 ──
const CHART_OPT_BASE = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor:'#1B2E23', borderColor:'rgba(255,255,255,.12)', borderWidth:1,
      titleColor:'#8FA396', bodyColor:'#E8EDE9', padding:10,
    }
  },
  scales:{
    x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#5E726A',font:{size:10},maxTicksLimit:10} },
    y:{ grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#5E726A',font:{size:10}, callback:v=>fmt(v)} }
  }
};

function buildViewsDataset(data, color, label){
  return {
    label, type:'line',
    data: data.map(d => d.views),
    borderColor: color,
    borderWidth: 2,
    backgroundColor: color.replace('1)', '.12)').replace('rgb(', 'rgba('),
    fill: true,
    tension: .4,
    pointRadius: 0,
    pointHoverRadius: 4,
    pointHoverBackgroundColor: color,
  };
}

function buildSubDeltaDataset(data, colorPos, colorNeg, label){
  const vals = data.slice(1).map((d,i) => d.subscribers - data[i].subscribers);
  return {
    label, type:'bar',
    data: vals,
    backgroundColor: vals.map(v => v >= 0 ? colorPos : colorNeg),
    borderWidth: 0, borderRadius: 3,
  };
}

function buildSubDataset(data, color, label){
  return {
    label, type:'line',
    data: data.map(d => d.subscribers),
    borderColor: color,
    borderWidth: 2,
    backgroundColor: color.replace('1)', '.10)').replace('rgb(', 'rgba('),
    fill: true, tension: .4,
    pointRadius: 0, pointHoverRadius: 4,
    pointHoverBackgroundColor: color,
  };
}

function renderMainChart(){
  const {daily: dA, views: vA} = filteredData(filterFrom, filterTo);
  const {daily: dB, views: vB} = compareMode ? filteredData(filterFromB, filterToB) : {};

  // チャートタイトル更新
  const METRIC_LABELS = {views:'再生数（日次）', sub_delta:'登録者増減（日次）', subscribers:'登録者数（累計）'};
  document.getElementById('chartLabel').textContent = METRIC_LABELS[activeMetric] || '';

  // データ無し判定
  const noData = (activeMetric === 'views' && !vA.length) ||
                 (activeMetric === 'sub_delta' && dA.length < 2) ||
                 (activeMetric === 'subscribers' && !dA.length);
  const canvas = document.getElementById('mainChart');
  const noDataEl = document.getElementById('chartNoData');
  if(noData){
    canvas.style.display = 'none';
    noDataEl.style.display = 'block';
    document.getElementById('dataGapNote').textContent = '';
    document.getElementById('chartSubLabel').textContent = '';
    if(mainChart){ mainChart.destroy(); mainChart = null; }
    return;
  }
  canvas.style.display = 'block';
  noDataEl.style.display = 'none';

  // データ件数サブラベル
  const ptCount = activeMetric === 'views' ? vA.length : (activeMetric === 'sub_delta' ? Math.max(0,dA.length-1) : dA.length);
  document.getElementById('chartSubLabel').textContent = ptCount + '日分';

  // ギャップ検出（全期間表示かつ欠損区間あり）
  const gapEl = document.getElementById('dataGapNote');
  if(!filterFrom && !filterTo && activeMetric === 'views'){
    const allV = allViewData();
    if(allV.length > 1){
      let maxGap = 0, gapStart = '', gapEnd = '';
      for(let i=1;i<allV.length;i++){
        const diff = (new Date(allV[i].date) - new Date(allV[i-1].date)) / 86400000;
        if(diff > maxGap){ maxGap = diff; gapStart = allV[i-1].date; gapEnd = allV[i].date; }
      }
      if(maxGap > 7){
        gapEl.textContent = `⚠ データ欠損: ${fmtDate(gapStart)}〜${fmtDate(gapEnd)}（${Math.round(maxGap)}日間）`;
      } else { gapEl.textContent = ''; }
    }
  } else { gapEl.textContent = ''; }

  let labels, datasets, tooltipFmt, titleDate = '';

  if(activeMetric === 'views'){
    if(!compareMode){
      labels   = vA.map(d => d.date.slice(5));
      datasets = [buildViewsDataset(vA, 'rgba(91,214,138,1)', '再生数')];
      tooltipFmt = ctx => {
        const date = vA[ctx.dataIndex]?.date || '';
        return ` ${fmtFull(ctx.raw)}回 (${fmtDate(date)})`;
      };
    } else {
      const len = Math.max(vA.length, (vB||[]).length);
      labels   = Array.from({length:len}, (_,i) => `Day ${i+1}`);
      datasets = [
        { ...buildViewsDataset(vA, 'rgba(91,214,138,1)', '期間A'),
          data: Array.from({length:len}, (_,i) => vA[i]?.views ?? null) },
        { ...buildViewsDataset(vB||[], 'rgba(201,162,39,1)', '期間B'),
          data: Array.from({length:len}, (_,i) => (vB||[])[i]?.views ?? null),
          borderDash: [5,3] }
      ];
      tooltipFmt = ctx => {
        const isA = ctx.datasetIndex === 0;
        const src = isA ? vA : (vB||[]);
        const d = src[ctx.dataIndex];
        return ` ${ctx.dataset.label}${d ? ' ('+fmtDate(d.date)+')' : ''}: ${fmtFull(ctx.raw)}回`;
      };
    }

  } else if(activeMetric === 'sub_delta'){
    if(!compareMode){
      const vals = dA.slice(1).map((d,i) => d.subscribers - dA[i].subscribers);
      const dates = dA.slice(1);
      labels   = dates.map(d => d.date.slice(5));
      datasets = [{
        label:'登録者増減', type:'bar', data:vals,
        backgroundColor: vals.map(v => v >= 0 ? 'rgba(91,214,138,.7)' : 'rgba(226,112,110,.7)'),
        borderWidth:0, borderRadius:3,
      }];
      tooltipFmt = ctx => {
        const d = dates[ctx.dataIndex];
        return ` ${fmtDate(d?.date||'')}: ${(ctx.raw??0) >= 0 ? '+' : ''}${fmtFull(ctx.raw??0)}人`;
      };
    } else {
      const datesA = dA.slice(1), datesB = dB ? dB.slice(1) : [];
      const valsA = datesA.map((d,i) => d.subscribers - dA[i].subscribers);
      const valsB = datesB.map((d,i) => d.subscribers - dB[i].subscribers);
      const len = Math.max(valsA.length, valsB.length);
      labels = Array.from({length:len}, (_,i) => `Day ${i+1}`);
      datasets = [
        { label:'期間A', type:'bar',
          data: Array.from({length:len}, (_,i) => valsA[i] ?? null),
          backgroundColor: valsA.map(v => v >= 0 ? 'rgba(91,214,138,.7)' : 'rgba(226,112,110,.7)'),
          borderWidth:0, borderRadius:3 },
        { label:'期間B', type:'bar',
          data: Array.from({length:len}, (_,i) => valsB[i] ?? null),
          backgroundColor: valsB.map(v => v >= 0 ? 'rgba(201,162,39,.6)' : 'rgba(226,112,110,.4)'),
          borderWidth:0, borderRadius:3 }
      ];
      tooltipFmt = ctx => {
        const isA = ctx.datasetIndex === 0;
        const src = isA ? datesA : datesB;
        const d = src[ctx.dataIndex];
        return ` ${ctx.dataset.label}${d ? ' ('+fmtDate(d.date)+')' : ''}: ${(ctx.raw??0) >= 0 ? '+' : ''}${fmtFull(ctx.raw??0)}人`;
      };
    }

  } else { // subscribers
    if(!compareMode){
      labels   = dA.map(d => d.date.slice(5));
      datasets = [buildSubDataset(dA, 'rgba(201,162,39,1)', '登録者数')];
      tooltipFmt = ctx => {
        const d = dA[ctx.dataIndex];
        return ` ${fmtDate(d?.date||'')}: ${fmtFull(ctx.raw)}人`;
      };
    } else {
      const len = Math.max(dA.length, (dB||[]).length);
      labels = Array.from({length:len}, (_,i) => `Day ${i+1}`);
      datasets = [
        { ...buildSubDataset(dA, 'rgba(201,162,39,1)', '期間A'),
          data: Array.from({length:len}, (_,i) => dA[i]?.subscribers ?? null) },
        { ...buildSubDataset(dB||[], 'rgba(91,214,138,1)', '期間B'),
          data: Array.from({length:len}, (_,i) => (dB||[])[i]?.subscribers ?? null),
          borderDash: [5,3] }
      ];
      tooltipFmt = ctx => {
        const isA = ctx.datasetIndex === 0;
        const src = isA ? dA : (dB||[]);
        const d = src[ctx.dataIndex];
        return ` ${ctx.dataset.label}${d ? ' ('+fmtDate(d.date)+')' : ''}: ${fmtFull(ctx.raw)}人`;
      };
    }
  }

  if(mainChart) mainChart.destroy();
  mainChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      ...CHART_OPT_BASE,
      plugins: {
        ...CHART_OPT_BASE.plugins,
        tooltip: {
          ...CHART_OPT_BASE.plugins.tooltip,
          callbacks: {
            title: items => items[0]?.label || '',
            label: tooltipFmt
          }
        }
      }
    }
  });

  // legend
  const legendEl = document.getElementById('chartLegend');
  if(compareMode && datasets.length > 1){
    legendEl.innerHTML = datasets.map(ds => {
      const col = Array.isArray(ds.backgroundColor) ? ds.borderColor : (ds.borderColor || ds.backgroundColor);
      return `<div class="legend-item"><div class="legend-dot" style="background:${col};${ds.borderDash?'border-top:2px dashed '+col+';background:none;height:0':''}"></div>${ds.label}</div>`;
    }).join('');
  } else {
    legendEl.innerHTML = '';
  }
}

// ── 比較テーブル ──
function renderCompareStrip(){
  const strip = document.getElementById('compareStrip');
  if(!compareMode || !filterFromB){ strip.style.display='none'; return; }
  strip.style.display = 'block';

  const mA = calcMetrics(filterFrom, filterTo);
  const mB = calcMetrics(filterFromB, filterToB);
  const pA = fmtDate(filterFrom||'') + '〜' + fmtDate(filterTo||'');
  const pB = fmtDate(filterFromB||'') + '〜' + fmtDate(filterToB||'');

  function diffTd(a, b, fmtFn){
    if(a === null || b === null) return '<td class="num" style="color:var(--muted)">—</td>';
    const d = a - b;
    const col = d > 0 ? 'var(--up)' : d < 0 ? 'var(--down)' : 'var(--muted)';
    return `<td class="num" style="color:${col}">${d >= 0 ? '+' : ''}${fmtFn(d)}</td>`;
  }

  document.getElementById('compareContent').innerHTML = `
    <table>
      <thead><tr>
        <th>指標</th>
        <th class="num" style="color:var(--up)">A <span style="font-weight:400;color:var(--muted)">${pA}</span></th>
        <th class="num" style="color:var(--gold)">B <span style="font-weight:400;color:var(--muted)">${pB}</span></th>
        <th class="num">A − B</th>
      </tr></thead>
      <tbody>
        <tr>
          <td>再生数</td>
          <td class="num">${fmtFull(mA.totalViews)}回</td>
          <td class="num">${fmtFull(mB.totalViews)}回</td>
          ${diffTd(mA.totalViews, mB.totalViews, n => fmtFull(Math.abs(n))+'回')}
        </tr>
        <tr>
          <td>登録者増減</td>
          <td class="num">${mA.subDelta !== null ? (mA.subDelta >= 0 ? '+' : '') + fmtFull(mA.subDelta) + '人' : '—'}</td>
          <td class="num">${mB.subDelta !== null ? (mB.subDelta >= 0 ? '+' : '') + fmtFull(mB.subDelta) + '人' : '—'}</td>
          ${mA.subDelta !== null && mB.subDelta !== null ? diffTd(mA.subDelta, mB.subDelta, n => fmtFull(Math.abs(n))+'人') : '<td class="num" style="color:var(--muted)">—</td>'}
        </tr>
        <tr>
          <td>平均日次再生</td>
          <td class="num">${mA.days ? fmtFull(Math.round(mA.totalViews/mA.days))+'回' : '—'}</td>
          <td class="num">${mB.days ? fmtFull(Math.round(mB.totalViews/mB.days))+'回' : '—'}</td>
          ${mA.days && mB.days ? diffTd(Math.round(mA.totalViews/mA.days), Math.round(mB.totalViews/mB.days), n => fmtFull(Math.abs(n))+'回') : '<td class="num" style="color:var(--muted)">—</td>'}
        </tr>
      </tbody>
    </table>`;
}

// ── Overview bar ──
function renderOverview(){
  const daily  = allDaily();
  const latest = daily.length ? daily[daily.length-1] : null;
  if(!latest){ document.getElementById('overviewBar').innerHTML=''; return; }

  const e7 = (() => {
    const d = new Date(latest.date + 'T00:00:00');
    d.setDate(d.getDate() - 7);
    const s = d.toISOString().slice(0,10);
    return [...daily].reverse().find(e => e.date <= s) || null;
  })();

  const weekViews = e7 ? Math.max(0, latest.total_views - e7.total_views) : null;
  const weekSub   = e7 ? latest.subscribers - e7.subscribers : null;
  const weekRate  = (e7 && e7.subscribers) ? (weekSub / e7.subscribers * 100) : null;

  // データ期間はanalyticsとスナップショット両方を考慮
  const allV = allViewData();
  const dataStart = allV.length ? allV[0].date : (daily.length ? daily[0].date : '');
  const dataEnd   = allV.length ? allV[allV.length-1].date : '';

  const items = [
    { label:'登録者数', val: fmtFull(latest.subscribers), sub:'人' },
    { label:'週間再生数', val: weekViews !== null ? fmt(weekViews) : '—', sub: weekViews !== null ? fmtFull(weekViews)+'回' : '' },
    { label:'登録者増加率（週）', val: weekRate !== null ? (weekRate >= 0 ? '+' : '') + weekRate.toFixed(2) + '%' : '—', sub: weekSub !== null ? (weekSub >= 0 ? '+' : '') + weekSub.toLocaleString() + '人' : '' },
    { label:'動画本数', val: latest.video_count.toLocaleString(), sub:'本' },
    { label:'データ期間', val: allV.length + '日', sub: fmtDate(dataStart) + '〜' + fmtDate(dataEnd) },
  ];

  document.getElementById('overviewBar').innerHTML = items.map(it => `
    <div class="ov-item">
      <div class="ov-label">${it.label}</div>
      <div class="ov-val">${it.val}</div>
      <div class="ov-sub">${it.sub}</div>
    </div>`).join('');
}

// ── 動画テーブル ──
function renderVideoTable(){
  const videos = G.videos;
  document.getElementById('videoCount').textContent = videos.length + '本';
  const rows = videos.slice(0,100).map((v,i) => `
    <tr>
      <td class="rank">${i+1}</td>
      <td>
        <div class="video-info">
          <img class="thumb" src="https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
          <div>
            <div class="title-cell" title="${v.title.replace(/"/g,'&quot;')}">${v.title}</div>
            <div style="font-size:11px;color:var(--muted-2);margin-top:2px">${fmtDate(v.published_at)}</div>
          </div>
        </div>
      </td>
      <td class="num">${fmtFull(v.views)}</td>
      <td class="num">${fmtFull(v.likes)}</td>
      <td class="num">${fmtFull(v.comments)}</td>
      <td class="num" style="white-space:nowrap">${fmtDate(v.published_at)}</td>
    </tr>`).join('');
  document.getElementById('videoBody').innerHTML = rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">動画データなし</td></tr>';
}

// ── rangeInfo 更新 ──
function updateRangeInfo(){
  const all = allViewData();
  const el = document.getElementById('rangeInfo');
  const from = filterFrom || (all.length ? all[0].date : '');
  const to   = filterTo   || (all.length ? all[all.length-1].date : '');
  if(from && to){
    const days = Math.round((new Date(to) - new Date(from)) / 86400000) + 1;
    el.textContent = fmtDate(from) + '〜' + fmtDate(to) + '（' + days + '日）';
  } else el.textContent = '';

  const elB = document.getElementById('rangeInfoB');
  if(filterFromB && filterToB){
    const daysB = Math.round((new Date(filterToB) - new Date(filterFromB)) / 86400000) + 1;
    elB.textContent = fmtDate(filterFromB) + '〜' + fmtDate(filterToB) + '（' + daysB + '日）';
  } else if(elB) elB.textContent = '';
}

// ── 全体再描画 ──
function renderAll(){
  updateRangeInfo();
  renderTiles();
  renderMainChart();
  renderCompareStrip();
}

// ── 初回レンダリング ──
function render(){
  initPeriod();
  renderOverview();
  renderVideoTable();
  renderAll();
}

loadData();
</script>
