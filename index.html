<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHANNEL DESK — りいポーカーチャンネル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0E1A14;
  --panel:#16241C;
  --panel-2:#1B2E23;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --ink:#E8EDE9;
  --muted:#8FA396;
  --muted-2:#5E726A;
  --gold:#C9A227;
  --gold-soft:#E0C45C;
  --up:#5BD68A;
  --down:#E2706E;
  --blue:#5BA6D6;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(11,93,59,.25),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(201,162,39,.08),transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:"Noto Sans JP",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:20px 18px 80px}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:12px 16px;margin-bottom:16px;
  background:linear-gradient(180deg,rgba(255,255,255,.03),transparent),var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);
}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto}
.brand .mark{
  width:34px;height:34px;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(160deg,#1f3a2b,#0d1d15);
  border:1px solid var(--line-strong);color:var(--gold);font-size:18px;
}
.brand h1{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:.14em;font-size:17px;line-height:1}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
.status-dot.live{background:var(--up);box-shadow:0 0 6px var(--up)}
.updated{font-size:12px;color:var(--muted)}
.btn{
  font-size:12px;font-weight:500;font-family:"Noto Sans JP",sans-serif;
  color:var(--ink);background:var(--panel-2);border:1px solid var(--line-strong);
  border-radius:9px;padding:7px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:border-color .15s,background .15s;
}
.btn:hover{border-color:var(--gold);background:#22382c}
.btn.active{border-color:var(--gold);background:rgba(201,162,39,.15);color:var(--gold)}

/* ── Loading ── */
#loadingState{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}
#loadingState .spin{
  width:34px;height:34px;border:3px solid var(--line-strong);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#errorState{display:none;text-align:center;padding:60px 20px;color:var(--down)}
#mainContent{display:none}

/* ── Tab nav ── */
.tab-nav{
  display:flex;gap:2px;
  border-bottom:1px solid var(--line-strong);
  margin-bottom:16px;
}
.tab-nav button{
  background:none;border:none;
  font-family:"Noto Sans JP",sans-serif;font-size:13px;font-weight:500;
  color:var(--muted);padding:10px 18px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.tab-nav button:hover{color:var(--ink)}
.tab-nav button.on{color:var(--gold-soft);border-bottom-color:var(--gold)}

/* ── Period bar ── */
.period-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:12px;
}
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
.seg button{
  background:transparent;border:none;color:var(--muted);
  font-family:"Noto Sans JP",sans-serif;font-size:11.5px;padding:6px 13px;cursor:pointer;
  transition:background .12s,color .12s;
}
.seg button.on{background:var(--panel-2);color:var(--ink);font-weight:600}
.period-bar .divider{width:1px;height:18px;background:var(--line-strong);flex-shrink:0}
.period-bar label{font-size:12px;color:var(--muted);white-space:nowrap}
.period-bar input[type=date]{
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line-strong);
  border-radius:7px;padding:5px 8px;font-family:"Noto Sans JP",sans-serif;font-size:12px;
  color-scheme:dark;
}
.range-info{font-size:11.5px;color:var(--muted-2);margin-left:auto;white-space:nowrap}

/* ── Metric tiles ── */
.metric-tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1px;
  background:var(--line-strong);
  border:1px solid var(--line-strong);
  border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
  overflow:hidden;
}
.metric-tile{
  background:var(--panel);padding:16px 20px;
  cursor:pointer;border-bottom:3px solid transparent;
  transition:background .15s,border-color .15s;
}
.metric-tile:hover{background:var(--panel-2)}
.metric-tile.active{border-bottom-color:var(--gold);background:var(--panel-2)}
.tile-label{font-size:11.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:6px}
.tile-val{font-family:"Oswald",sans-serif;font-size:26px;font-weight:400;line-height:1}
.tile-unit{font-size:12px;color:var(--muted);margin-left:3px}
.tile-change{margin-top:5px;font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:4px}
.tile-change.up{color:var(--up)} .tile-change.down{color:var(--down)} .tile-change.flat{color:var(--muted)}

/* ── Chart card ── */
.chart-card{
  background:var(--panel);border:1px solid var(--line-strong);
  border-top:none;border-radius:0 0 var(--radius) var(--radius);
  padding:20px 20px 16px;margin-bottom:14px;
}
.chart-card.standalone{border-top:1px solid var(--line-strong);border-radius:var(--radius);margin-bottom:14px}
.chart-title{font-size:11.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.chart-title .ct-label{font-weight:600;color:var(--ink)}
.chart-nodata{display:none;text-align:center;padding:60px 0;color:var(--muted-2);font-size:13px}
.data-gap-note{font-size:10.5px;color:var(--muted-2);margin-top:8px}
.chart-box{position:relative;height:280px}
.chart-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
.legend-dot{width:10px;height:3px;border-radius:2px}

/* ── Compare strip ── */
.compare-strip{
  background:var(--panel);border:1px solid var(--line-strong);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;
}
.compare-strip table{width:100%;border-collapse:collapse;font-size:13px}
.compare-strip th,.compare-strip td{padding:7px 10px;border-bottom:1px solid var(--line)}
.compare-strip th{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.compare-strip td.num,.compare-strip th.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"Oswald",sans-serif}

/* ── Overview bar ── */
.overview-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px;background:var(--line-strong);
  border:1px solid var(--line-strong);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px;
}
.ov-item{background:var(--panel);padding:13px 16px}
.ov-label{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-bottom:4px}
.ov-val{font-family:"Oswald",sans-serif;font-size:20px;font-weight:400;line-height:1}
.ov-sub{font-size:10.5px;color:var(--muted-2);margin-top:3px}

/* ── Card ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card h3{
  font-family:"Oswald",sans-serif;font-weight:400;letter-spacing:.08em;font-size:13px;
  color:var(--muted);margin-bottom:14px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}

/* ── Week vs Week summary ── */
.week-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:1px;background:var(--line-strong);
  border:1px solid var(--line-strong);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px;
}
.ws-item{background:var(--panel);padding:14px 18px}
.ws-label{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em}
.ws-row{display:flex;align-items:baseline;gap:10px}
.ws-val{font-family:"Oswald",sans-serif;font-size:22px}
.ws-delta{font-size:12px;font-weight:600}
.ws-delta.up{color:var(--up)} .ws-delta.down{color:var(--down)} .ws-delta.flat{color:var(--muted)}
.ws-sub{font-size:10.5px;color:var(--muted-2);margin-top:3px}

/* ── Video cards ── */
.video-list{display:flex;flex-direction:column;gap:10px}
.video-card{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;border-radius:10px;
  background:var(--panel-2);border:1px solid var(--line);
  transition:border-color .15s;cursor:pointer;
}
.video-card:hover{border-color:var(--line-strong)}
.vc-rank{
  font-family:"Oswald",sans-serif;font-size:18px;font-weight:600;
  color:var(--gold);min-width:32px;text-align:center;flex-shrink:0;
}
.vc-rank.top3{font-size:22px}
.vc-thumb{
  width:120px;height:68px;border-radius:6px;object-fit:cover;
  background:var(--panel);border:1px solid var(--line);flex-shrink:0;
}
.vc-body{flex:1;min-width:0}
.vc-title{
  font-size:13px;font-weight:500;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.45;margin-bottom:6px;
}
.vc-meta{display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center}
.vc-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.vc-stat strong{color:var(--ink);font-weight:600}
.vc-bar-wrap{width:100%;background:rgba(255,255,255,.06);border-radius:3px;height:3px;margin-top:6px;overflow:hidden}
.vc-bar{height:100%;border-radius:3px;background:var(--gold);transition:width .4s}
.vc-date{font-size:11px;color:var(--muted-2);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* ── Growth badge ── */
.growth-badge{
  font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;
  display:inline-flex;align-items:center;gap:3px;flex-shrink:0;
}
.growth-badge.up{background:rgba(91,214,138,.15);color:var(--up)}
.growth-badge.down{background:rgba(226,112,110,.12);color:var(--down)}
.growth-badge.new{background:rgba(201,162,39,.15);color:var(--gold-soft)}

/* ── Period seg ── */
.period-seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;margin-bottom:14px}
.period-seg button{
  background:transparent;border:none;color:var(--muted);
  font-family:"Noto Sans JP",sans-serif;font-size:12px;padding:7px 16px;cursor:pointer;
  transition:background .12s,color .12s;
}
.period-seg button.on{background:var(--panel-2);color:var(--gold-soft);font-weight:600}

/* ── No data ── */
.no-data{text-align:center;color:var(--muted-2);padding:40px 20px;font-size:13px;line-height:1.7}

/* ── Modal ── */
.vmodal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.vmodal-overlay.open{opacity:1;pointer-events:auto}
.vmodal{
  background:var(--panel);border:1px solid var(--line-strong);
  border-radius:16px;width:100%;max-width:580px;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  transform:translateY(12px);transition:transform .2s;overflow:hidden;
}
.vmodal-overlay.open .vmodal{transform:translateY(0)}
.vmodal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--line);
}
.vmodal-header span{font-size:12px;color:var(--muted);font-family:"Oswald",sans-serif;letter-spacing:.08em}
.vmodal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px;transition:color .15s}
.vmodal-close:hover{color:var(--ink)}
.vmodal-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--panel-2)}
.vmodal-body{padding:16px 18px 20px}
.vmodal-title{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:12px}
.vmodal-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.vmodal-stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:center}
.vmodal-stat .label{font-size:11px;color:var(--muted);margin-bottom:4px}
.vmodal-stat .value{font-size:16px;font-family:"Oswald",sans-serif;font-weight:500}
.vmodal-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted-2);margin-bottom:14px}
.vmodal-link{
  display:block;text-align:center;padding:10px;border-radius:10px;
  background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.3);
  color:var(--gold-soft);font-size:13px;font-weight:600;text-decoration:none;
  transition:background .15s;
}
.vmodal-link:hover{background:rgba(201,162,39,.22)}

.foot{color:var(--muted-2);font-size:11px;text-align:center;margin-top:30px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="mark">♠</div>
      <div>
        <h1>CHANNEL&nbsp;DESK</h1>
        <div class="sub">りいポーカーチャンネル</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <span class="updated" id="updatedLabel">読み込み中…</span>
    <button class="btn" onclick="loadData()">↻ 更新</button>
  </div>

  <div id="loadingState"><div class="spin"></div>データを読み込んでいます…</div>
  <div id="errorState"><div style="font-size:28px;margin-bottom:10px">⚠️</div><div id="errorMsg">読み込み失敗</div></div>

  <div id="mainContent">

    <!-- Tab nav -->
    <nav class="tab-nav">
      <button onclick="switchTab('overview')"  id="tab-overview"  class="on">📊 概要</button>
      <button onclick="switchTab('growth')"    id="tab-growth"        >📈 伸び率</button>
      <button onclick="switchTab('weekly')"    id="tab-weekly"        >📅 今週 vs 先週</button>
      <button onclick="switchTab('videos')"    id="tab-videos"        >🎬 動画一覧</button>
    </nav>

    <!-- ════════════════════════ TAB: 概要 ════════════════════════ -->
    <div id="pane-overview">

      <!-- Period bar -->
      <div class="period-bar">
        <div class="seg" id="quickSeg">
          <button onclick="setQuick(7,this)">7日</button>
          <button onclick="setQuick(28,this)">28日</button>
          <button onclick="setQuick(90,this)">90日</button>
          <button onclick="setQuick(365,this)">365日</button>
          <button onclick="setQuick(0,this)">全期間</button>
        </div>
        <div class="divider"></div>
        <label>A</label>
        <input type="date" id="dateFrom" onchange="onDateChange()">
        <label>〜</label>
        <input type="date" id="dateTo" onchange="onDateChange()">
        <button class="btn" id="compareBtn" onclick="toggleCompare()">比較</button>
        <span class="range-info" id="rangeInfo"></span>
      </div>

      <!-- Period B -->
      <div class="period-bar" id="periodBBar" style="display:none">
        <label style="color:var(--gold);font-weight:600;min-width:10px">B</label>
        <input type="date" id="dateFromB" onchange="onDateChangeB()">
        <label>〜</label>
        <input type="date" id="dateToB" onchange="onDateChangeB()">
        <span class="range-info" id="rangeInfoB"></span>
      </div>

      <!-- Metric tiles -->
      <div class="metric-tiles" id="metricTiles"></div>

      <!-- Main chart -->
      <div class="chart-card">
        <div class="chart-title"><span class="ct-label" id="chartLabel">再生数</span><span id="chartSubLabel" style="color:var(--muted-2)"></span></div>
        <div class="chart-box"><canvas id="mainChart"></canvas><div class="chart-nodata" id="chartNoData">このperiodのデータがありません</div></div>
        <div class="chart-legend" id="chartLegend"></div>
        <div class="data-gap-note" id="dataGapNote"></div>
      </div>

      <!-- Compare strip -->
      <div class="compare-strip" id="compareStrip" style="display:none"><div id="compareContent"></div></div>

      <!-- Overview bar -->
      <div class="overview-bar" id="overviewBar"></div>

    </div><!-- /pane-overview -->

    <!-- ════════════════════════ TAB: 伸び率 ════════════════════════ -->
    <div id="pane-growth" style="display:none">
      <div class="period-seg" id="growthSeg">
        <button onclick="setGrowthPeriod(7,this)"   class="on">7日</button>
        <button onclick="setGrowthPeriod(28,this)"        >28日</button>
        <button onclick="setGrowthPeriod(90,this)"        >90日</button>
        <button onclick="setGrowthPeriod(365,this)"       >365日</button>
      </div>

      <div id="growthContent"></div>
    </div>

    <!-- ════════════════════════ TAB: 今週 vs 先週 ════════════════════════ -->
    <div id="pane-weekly" style="display:none">

      <div class="week-summary" id="weekSummary"></div>

      <div class="chart-card standalone">
        <div class="chart-title"><span class="ct-label">日次再生数 — 今週 vs 先週</span></div>
        <div class="chart-box"><canvas id="weekChart"></canvas><div class="chart-nodata" id="weekChartNoData">データが不足しています（7日分以上蓄積後に表示）</div></div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--up)"></div>今週</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--gold);opacity:.6"></div>先週</div>
        </div>
      </div>

      <div class="chart-card standalone">
        <div class="chart-title"><span class="ct-label">視聴時間（分）— 今週 vs 先週</span></div>
        <div class="chart-box"><canvas id="watchChart"></canvas><div class="chart-nodata" id="watchChartNoData">Analytics データなし（GitHub Secrets 設定後に自動取得）</div></div>
      </div>

    </div>

    <!-- ════════════════════════ TAB: 動画一覧 ════════════════════════ -->
    <div id="pane-videos" style="display:none">
      <div class="card">
        <h3><span class="dot"></span><span id="videoRankLabel">動画ランキング</span><span style="margin-left:auto;font-size:11px;color:var(--muted-2);text-transform:none;font-family:'Noto Sans JP',sans-serif" id="videoCount"></span></h3>
        <div class="video-list" id="videoBody"></div>
      </div>
    </div>

  </div><!-- /mainContent -->

  <div class="foot" id="footNote"></div>
</div>

<!-- Video detail modal -->
<div class="vmodal-overlay" id="vmodalOverlay" onclick="closeVideoModal(event)">
  <div class="vmodal">
    <div class="vmodal-header">
      <span id="vmodalRank"></span>
      <button class="vmodal-close" onclick="closeVideoModal()">×</button>
    </div>
    <img class="vmodal-thumb" id="vmodalThumb" src="" alt="">
    <div class="vmodal-body">
      <div class="vmodal-title" id="vmodalTitle"></div>
      <div class="vmodal-stats" id="vmodalStats"></div>
      <div class="vmodal-meta" id="vmodalMeta"></div>
      <a class="vmodal-link" id="vmodalLink" href="" target="_blank" rel="noopener">▶ YouTubeで開く</a>
    </div>
  </div>
</div>

<script>
const DATA_URL = window.location.protocol === 'file:'
  ? "https://raw.githubusercontent.com/ytpokerguild-netizen/channel-desk-data/main/data.json"
  : "/data.json";

let G = null;
let mainChart = null, weekChart = null, watchChart = null;
let filterFrom = null, filterTo = null;
let compareMode = false;
let filterFromB = null, filterToB = null;
let activeMetric = 'views';
let activeTab = 'overview';
let growthPeriod = 7;
let _rankVideos = [];

// ════════════════════════════════
// フォーマット
// ════════════════════════════════
function fmt(n){ return n>=10000 ? (n/10000).toFixed(1).replace(/\.0$/,'')+'万' : n.toLocaleString('ja-JP'); }
function fmtFull(n){ return (n??0).toLocaleString('ja-JP'); }
function fmtDate(s){ return s ? s.replace(/-/g,'/') : ''; }
function fmtMin(m){ return m >= 60 ? Math.round(m/60).toLocaleString()+'時間' : m.toLocaleString()+'分'; }
function fmtDur(s){ if(!s) return '—'; const m=Math.floor(s/60), sec=s%60; return `${m}:${String(sec).padStart(2,'0')}`; }

async function loadData(){
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if(!r.ok) throw new Error('HTTP ' + r.status);
    G = await r.json();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('updatedLabel').textContent = '更新: ' + fmtDate(G.meta.data_through);
    document.getElementById('footNote').textContent =
      'channel-desk-data · ' + G.meta.channel_id + ' · ' + G.meta.data_through;
    initPeriod();
    renderAll();
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = '読み込み失敗: ' + e.message;
    document.getElementById('statusDot').className = 'status-dot';
  }
}

// データヘルパー
// ════════════════════════════════
function dedupeByDate(arr){
  const m = new Map();
  arr.forEach(d => m.set(d.date, d));
  return [...m.values()].sort((a,b)=>a.date.localeCompare(b.date));
}
function allDaily(){ return dedupeByDate((G.daily||[]).filter(d=>d.subscribers>0||d.total_views>0)); }
function allViewData(){
  const map = new Map();
  // Analytics 日次を優先
  (G.analytics_daily||[]).forEach(d=>{if(d.views>0) map.set(d.date,{date:d.date,views:d.views});});
  // フォールバック: スナップショット差分
  const daily = allDaily();
  for(let i=1;i<daily.length;i++){
    const delta = Math.max(0, daily[i].total_views - daily[i-1].total_views);
    if(!map.has(daily[i].date)) map.set(daily[i].date,{date:daily[i].date,views:delta});
  }
  return [...map.values()].sort((a,b)=>a.date.localeCompare(b.date));
}
function filteredData(from,to){
  const daily = allDaily().filter(d=>(!from||d.date>=from)&&(!to||d.date<=to));
  const views  = allViewData().filter(d=>(!from||d.date>=from)&&(!to||d.date<=to));
  return {daily, views};
}

function setQuick(days, btn){
  document.querySelectorAll('#quickSeg button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const all = allViewData();
  if(!all.length) return;
  const to = all[all.length-1].date;
  if(days === 0){
    filterFrom = null; filterTo = null;
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
  } else {
    const d = new Date(to+'T00:00:00'); d.setDate(d.getDate()-days+1);
    filterFrom = d.toISOString().slice(0,10); filterTo = to;
    document.getElementById('dateFrom').value = filterFrom;
    document.getElementById('dateTo').value   = filterTo;
  }
  renderOverview();
}
function onDateChange(){
  filterFrom = document.getElementById('dateFrom').value||null;

function toggleCompare(){
  compareMode = !compareMode;
  document.getElementById('compareBtn').classList.toggle('active', compareMode);
  document.getElementById('periodBBar').style.display = compareMode ? 'flex' : 'none';
  if(compareMode && filterFrom && filterTo){
    const ms = new Date(filterTo)-new Date(filterFrom);
    const days = Math.round(ms/86400000)+1;
    const toB = new Date(filterFrom+'T00:00:00'); toB.setDate(toB.getDate()-1);
    const fromB = new Date(toB); fromB.setDate(fromB.getDate()-days+1);

    filterToB   = toB.toISOString().slice(0,10);

  renderOverview();

// ════════════════════════════════
// 概要タブ: メトリクスタイル
// ════════════════════════════════
function calcMetrics(from,to){
  const {daily, views} = filteredData(from,to);
  const totalViews = views.reduce((s,d)=>s+d.views,0);
  const totalWatchMin = (G.analytics_daily||[])
    .filter(d=>(!from||d.date>=from)&&(!to||d.date<=to))
    .reduce((s,d)=>s+(d.watch_min||0),0);
  const subFirst = daily.length ? daily[0].subscribers : null;
  const subLast  = daily.length ? daily[daily.length-1].subscribers : null;
  const subDelta = (subFirst!==null&&subLast!==null) ? subLast-subFirst : null;
  return { totalViews, totalWatchMin, subDelta, subLatest:subLast, days:views.length };
}

function renderTiles(){
  const mA = calcMetrics(filterFrom, filterTo);
  const mB = compareMode ? calcMetrics(filterFromB, filterToB) : null;

  const metrics = [
    { key:'views',      label:'再生数',    valA:mA.totalViews,    unit:'回',   fmtFn:n=>fmt(n) },
    { key:'watch_min',  label:'視聴時間',  valA:mA.totalWatchMin, unit:'',     fmtFn:n=>fmtMin(n) },
    { key:'sub_delta',  label:'登録者増減', valA:mA.subDelta,      unit:'人',   fmtFn:n=>(n>=0?'+':'')+fmtFull(n) },
    { key:'subscribers',label:'登録者数',  valA:mA.subLatest,     unit:'人',   fmtFn:n=>fmtFull(n) },
  ];

  const html = metrics.map(m => {
    const isActive = m.key === activeMetric;
    const valStr = m.valA !== null ? m.fmtFn(m.valA) : '—';
    let changeHtml = '';
    const mBval = mB ? (m.key==='views'?mB.totalViews : m.key==='watch_min'?mB.totalWatchMin : m.key==='sub_delta'?mB.subDelta : mB.subLatest) : null;
    if(mBval !== null && m.valA !== null){
      const diff = m.valA - mBval;
      const pct  = mBval!==0 ? diff/Math.abs(mBval)*100 : null;
      const cls  = diff>0?'up':diff<0?'down':'flat';
      changeHtml = `<div class="tile-change ${cls}">${diff>=0?'+':''}${fmtFull(diff)}${m.unit}${pct!==null?' ('+(pct>=0?'+':'')+pct.toFixed(1)+'%)':''} vs B</div>`;
    } else if(!compareMode){
      changeHtml = `<div class="tile-change flat" style="color:var(--muted-2);font-size:10.5px">${filterFrom?fmtDate(filterFrom)+'〜'+fmtDate(filterTo||''):'全期間'}</div>`;
    }
    return `<div class="metric-tile ${isActive?'active':''}" onclick="setMetric('${m.key}')">
      <div class="tile-label">${m.label}</div>
      <div class="tile-val">${valStr}<span class="tile-unit">${m.unit}</span></div>
      ${changeHtml}</div>`;
  }).join('');
  document.getElementById('metricTiles').innerHTML = html;
}

  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{display:false},
    tooltip:{
      backgroundColor:'#1B2E23',borderColor:'rgba(255,255,255,.12)',borderWidth:1,
      titleColor:'#8FA396',bodyColor:'#E8EDE9',padding:10,
    }
  },
  scales:{
    x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5E726A',font:{size:10},maxTicksLimit:10}},
    y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#5E726A',font:{size:10},callback:v=>fmt(v)}}
  }
};

function renderMainChart(){
  const {daily:dA, views:vA} = filteredData(filterFrom, filterTo);
  const {daily:dB, views:vB} = compareMode ? filteredData(filterFromB, filterToB) : {};
  const LABELS = {views:'再生数（日次）',watch_min:'視聴時間（日次）',sub_delta:'登録者増減（日次）',subscribers:'登録者数（累計）'};
  document.getElementById('chartLabel').textContent = LABELS[activeMetric]||'';

  const analyticsDaily = G.analytics_daily || [];
  const adMap = new Map(analyticsDaily.map(d=>[d.date,d]));
  const adA = vA.map(d=>({...d, watch_min:(adMap.get(d.date)||{}).watch_min||0}));

  let labels, datasets, ttFmt;

  if(activeMetric === 'views'){
    if(!vA.length){
      document.getElementById('mainChart').style.display='none';
      document.getElementById('chartNoData').style.display='block';
      if(mainChart){mainChart.destroy();mainChart=null;}
      return;
    }
    if(!compareMode){
      labels   = vA.map(d=>d.date.slice(5));
      datasets = [{label:'再生数',type:'line',data:vA.map(d=>d.views),borderColor:'rgba(91,214,138,1)',borderWidth:2,backgroundColor:'rgba(91,214,138,.10)',fill:true,tension:.4,pointRadius:0,pointHoverRadius:4}];
      ttFmt = ctx=>`${fmtFull(ctx.raw)}回 (${fmtDate(vA[ctx.dataIndex]?.date||'')})`;
    } else {
      const len=Math.max(vA.length,(vB||[]).length);
      labels=Array.from({length:len},(_,i)=>`Day ${i+1}`);
      datasets=[
        {label:'期間A',type:'line',data:Array.from({length:len},(_,i)=>vA[i]?.views??null),borderColor:'rgba(91,214,138,1)',borderWidth:2,backgroundColor:'rgba(91,214,138,.10)',fill:true,tension:.4,pointRadius:0,pointHoverRadius:4},
        {label:'期間B',type:'line',data:Array.from({length:len},(_,i)=>(vB||[])[i]?.views??null),borderColor:'rgba(201,162,39,1)',borderWidth:2,backgroundColor:'rgba(201,162,39,.08)',fill:true,tension:.4,pointRadius:0,pointHoverRadius:4,borderDash:[5,3]},
      ];
      ttFmt=ctx=>{const s=ctx.datasetIndex===0?vA:(vB||[]);const d=s[ctx.dataIndex];return `${ctx.dataset.label}${d?' ('+fmtDate(d.date)+')':''}: ${fmtFull(ctx.raw)}回`;};
    }
  } else if(activeMetric === 'watch_min'){
    if(!adA.length){
      document.getElementById('mainChart').style.display='none';
      document.getElementById('chartNoData').style.display='block';
      if(mainChart){mainChart.destroy();mainChart=null;}
      return;
    }
    labels   = adA.map(d=>d.date.slice(5));
    datasets = [{label:'視聴時間',type:'bar',data:adA.map(d=>d.watch_min),backgroundColor:'rgba(91,166,214,.6)',borderWidth:0,borderRadius:3}];
    ttFmt=ctx=>`${fmtMin(ctx.raw)} (${fmtDate(adA[ctx.dataIndex]?.date||'')})`;
  } else if(activeMetric === 'sub_delta'){
    if(dA.length<2){
      document.getElementById('mainChart').style.display='none';
      document.getElementById('chartNoData').style.display='block';
      if(mainChart){mainChart.destroy();mainChart=null;}
      return;
    }
    const dates=dA.slice(1), vals=dates.map((d,i)=>d.subscribers-dA[i].subscribers);
    labels=dates.map(d=>d.date.slice(5));
    datasets=[{label:'増減',type:'bar',data:vals,backgroundColor:vals.map(v=>v>=0?'rgba(91,214,138,.7)':'rgba(226,112,110,.7)'),borderWidth:0,borderRadius:3}];
    ttFmt=ctx=>`${fmtDate(dates[ctx.dataIndex]?.date||'')}: ${ctx.raw>=0?'+':''}${fmtFull(ctx.raw)}人`;
  } else { // subscribers
    if(!dA.length){
      document.getElementById('mainChart').style.display='none';
      document.getElementById('chartNoData').style.display='block';
      if(mainChart){mainChart.destroy();mainChart=null;}
      return;
    }
    labels=dA.map(d=>d.date.slice(5));
    datasets=[{label:'登録者',type:'line',data:dA.map(d=>d.subscribers),borderColor:'rgba(201,162,39,1)',borderWidth:2,backgroundColor:'rgba(201,162,39,.10)',fill:true,tension:.4,pointRadius:0,pointHoverRadius:4}];
    ttFmt=ctx=>`${fmtDate(dA[ctx.dataIndex]?.date||'')}: ${fmtFull(ctx.raw)}人`;
  }

  document.getElementById('mainChart').style.display='block';
  document.getElementById('chartNoData').style.display='none';
  document.getElementById('chartSubLabel').textContent = datasets[0]?.data?.filter(v=>v!=null).length + '日分';

  if(mainChart) mainChart.destroy();
  const opt = JSON.parse(JSON.stringify(CHART_BASE));
  opt.plugins.tooltip.callbacks = {title:i=>i[0]?.label||'', label:ttFmt};
  mainChart = new Chart(document.getElementById('mainChart'),{type:'line',data:{labels,datasets},options:opt});

  const lg = document.getElementById('chartLegend');
  lg.innerHTML = compareMode && datasets.length>1
    ? datasets.map(ds=>`<div class="legend-item"><div class="legend-dot" style="background:${ds.borderColor||ds.backgroundColor[0]}"></div>${ds.label}</div>`).join('')
    : '';

  // ギャップ検出
  const gapEl = document.getElementById('dataGapNote');
  if(!filterFrom && activeMetric==='views'){
    const allV=allViewData(); let maxGap=0,gs='',ge='';
    for(let i=1;i<allV.length;i++){const diff=(new Date(allV[i].date)-new Date(allV[i-1].date))/86400000;if(diff>maxGap){maxGap=diff;gs=allV[i-1].date;ge=allV[i].date;}}
    gapEl.textContent = maxGap>7 ? `⚠ データ欠損: ${fmtDate(gs)}〜${fmtDate(ge)}（${Math.round(maxGap)}日間）` : '';
  } else gapEl.textContent='';
}

function renderCompareStrip(){
  const strip = document.getElementById('compareStrip');
  if(!compareMode||!filterFromB){strip.style.display='none';return;}
  strip.style.display='block';
  const mA=calcMetrics(filterFrom,filterTo), mB=calcMetrics(filterFromB,filterToB);
  const pA=fmtDate(filterFrom||'')+'〜'+fmtDate(filterTo||'');
  const pB=fmtDate(filterFromB||'')+'〜'+fmtDate(filterToB||'');
  const diffTd=(a,b,f)=>{
    if(a===null||b===null) return '<td class="num" style="color:var(--muted)">—</td>';
    const d=a-b, col=d>0?'var(--up)':d<0?'var(--down)':'var(--muted)';
    return `<td class="num" style="color:${col}">${d>=0?'+':''}${f(Math.abs(d))}</td>`;
  };
  document.getElementById('compareContent').innerHTML=`
    <table><thead><tr>
      <th>指標</th>
      <th class="num" style="color:var(--up)">A <span style="font-weight:400;color:var(--muted)">${pA}</span></th>
      <th class="num" style="color:var(--gold)">B <span style="font-weight:400;color:var(--muted)">${pB}</span></th>
      <th class="num">A − B</th>
    </tr></thead><tbody>
      <tr><td>再生数</td><td class="num">${fmtFull(mA.totalViews)}回</td><td class="num">${fmtFull(mB.totalViews)}回</td>${diffTd(mA.totalViews,mB.totalViews,n=>fmtFull(n)+'回')}</tr>
      <tr><td>視聴時間</td><td class="num">${fmtMin(mA.totalWatchMin)}</td><td class="num">${fmtMin(mB.totalWatchMin)}</td>${diffTd(mA.totalWatchMin,mB.totalWatchMin,n=>fmtMin(n))}</tr>
      <tr><td>登録者増減</td><td class="num">${mA.subDelta!==null?(mA.subDelta>=0?'+':'')+fmtFull(mA.subDelta)+'人':'—'}</td><td class="num">${mB.subDelta!==null?(mB.subDelta>=0?'+':'')+fmtFull(mB.subDelta)+'人':'—'}</td>${mA.subDelta!==null&&mB.subDelta!==null?diffTd(mA.subDelta,mB.subDelta,n=>fmtFull(n)+'人'):'<td class="num">—</td>'}</tr>
    </tbody></table>`;
}

function renderOverviewBar(){
  const daily=allDaily(), latest=daily.length?daily[daily.length-1]:null;
  if(!latest){document.getElementById('overviewBar').innerHTML='';return;}
  const d7 = new Date(latest.date+'T00:00:00'); d7.setDate(d7.getDate()-7);
  const e7 = [...daily].reverse().find(e=>e.date<=d7.toISOString().slice(0,10))||null;
  const weekViews = e7 ? Math.max(0,latest.total_views-e7.total_views) : null;
  const weekSub   = e7 ? latest.subscribers-e7.subscribers : null;
  const allV=allViewData();
  const dataStart=allV.length?allV[0].date:(daily.length?daily[0].date:'');
  const dataEnd=allV.length?allV[allV.length-1].date:'';
  const vp=G.video_period||{};
  const hasPeriod=Object.keys(vp).length>0;
  document.getElementById('overviewBar').innerHTML=[
    {label:'登録者数',val:fmtFull(latest.subscribers),sub:'人'},
    {label:'週間再生数',val:weekViews!==null?fmt(weekViews):'—',sub:weekViews!==null?fmtFull(weekViews)+'回':''},
    {label:'週間登録者増減',val:weekSub!==null?(weekSub>=0?'+':'')+fmtFull(weekSub):'—',sub:'人'},
    {label:'動画本数',val:latest.video_count.toLocaleString(),sub:'本'},
    {label:'期間データ',val:hasPeriod?'✓':'—',sub:hasPeriod?'7/28/90/365日':'Analytics未設定'},
    {label:'データ期間',val:allV.length+'日',sub:fmtDate(dataStart)+'〜'+fmtDate(dataEnd)},
  ].map(it=>`<div class="ov-item"><div class="ov-label">${it.label}</div><div class="ov-val">${it.val}</div><div class="ov-sub">${it.sub}</div></div>`).join('');
}

function updateRangeInfo(){
  const all=allViewData();
  const from=filterFrom||(all.length?all[0].date:'');
  const to=filterTo||(all.length?all[all.length-1].date:'');
  const el=document.getElementById('rangeInfo');
  if(from&&to){ const days=Math.round((new Date(to)-new Date(from))/86400000)+1; el.textContent=fmtDate(from)+'〜'+fmtDate(to)+'（'+days+'日）'; } else el.textContent='';
  const elB=document.getElementById('rangeInfoB');
  if(filterFromB&&filterToB){ const d=Math.round((new Date(filterToB)-new Date(filterFromB))/86400000)+1; elB.textContent=fmtDate(filterFromB)+'〜'+fmtDate(filterToB)+'（'+d+'日）'; } else if(elB) elB.textContent='';
}

function renderOverview(){
  updateRangeInfo();
  renderTiles();
  renderMainChart();
  renderCompareStrip();
  renderOverviewBar();
}

  growthPeriod = days;
  document.querySelectorAll('#growthSeg button').forEach(b=>b.classList.remove('on'));

  renderGrowth();

function renderGrowth(){
  const vp = G.video_period || {};
  const key = String(growthPeriod);
  const periodData = vp[key] || {};
  const vs = G.video_snapshots || [];
  const container = document.getElementById('growthContent');

  // 期間データがある場合: video_period を使う
  if(Object.keys(periodData).length > 0){
    const today = G.meta.data_through;
    const videos = (G.videos||[]).map(v => {
      const pd = periodData[v.video_id];
      return pd ? {
        ...v,
        period_views: pd.views,
        period_watch_min: pd.watch_min,
        avg_dur_sec: pd.avg_dur_sec,
      } : null;
    }).filter(Boolean).sort((a,b)=>b.period_views-a.period_views);

    if(!videos.length){ container.innerHTML = '<div class="no-data">期間データがありません。Analytics API の設定を確認してください。</div>'; return; }

    const maxViews = videos[0]?.period_views || 1;

    // スナップショットから伸び率を計算（あれば）
    const snapshotGrowthMap = calcSnapshotGrowth(growthPeriod, vs);

    container.innerHTML = `
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
        直近${growthPeriod}日間の再生数ランキング（Analytics API データ）
      </div>
      <div class="video-list">
        ${videos.slice(0,100).map((v,i)=>{
          const n=i+1;
          const medal=n===1?'🥇':n===2?'🥈':n===3?'🥉':n;
          const growth = snapshotGrowthMap[v.video_id];
          const growthBadge = growth !== undefined
            ? `<span class="growth-badge ${growth>=0?'up':'down'}">${growth>=0?'▲':'▼'}${Math.abs(growth).toFixed(1)}%</span>`
            : '';
          return `
          <div class="video-card" onclick="openVideoModalFromGrowth('${v.video_id}',${n})">
            <div class="vc-rank ${n<=3?'top3':''}">${medal}</div>
            <img class="vc-thumb" src="https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
            <div class="vc-body">
              <div class="vc-title">${v.title}</div>
              <div class="vc-meta">
                <span class="vc-stat">👁 <strong>${fmtFull(v.period_views)}</strong>回</span>
                ${v.period_watch_min?`<span class="vc-stat">⏱ <strong>${fmtMin(v.period_watch_min)}</strong></span>`:''}
                ${v.avg_dur_sec?`<span class="vc-stat">🎬 <strong>${fmtDur(v.avg_dur_sec)}</strong></span>`:''}
                ${growthBadge}
                <span class="vc-date">${fmtDate(v.published_at)}</span>
              </div>
              <div class="vc-bar-wrap"><div class="vc-bar" style="width:${Math.round(v.period_views/maxViews*100)}%"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>`;

  } else if(vs.length >= 2){
    // フォールバック: スナップショット差分
    const snapshotGrowthMap = calcSnapshotGrowth(growthPeriod, vs);
    if(!Object.keys(snapshotGrowthMap).length){ container.innerHTML = '<div class="no-data">スナップショットデータが不足しています。<br>毎日自動取得中です（'+growthPeriod+'日後に完成）。</div>'; return; }

    const videos = (G.videos||[]).map(v=>{
      const g = snapshotGrowthMap[v.video_id];
      if(g===undefined) return null;
      const gained = calcSnapshotGained(v.video_id, growthPeriod, vs);
      return {...v, period_views:gained, growth_pct:g};
    }).filter(v=>v&&v.period_views>0).sort((a,b)=>b.period_views-a.period_views);

    const maxViews = videos[0]?.period_views||1;
    container.innerHTML = `
      <div style="font-size:12px;color:var(--muted-2);margin-bottom:10px">
        ⚠ Analytics API 未接続 — スナップショット差分（暫定データ）
      </div>
      <div class="video-list">
        ${videos.slice(0,100).map((v,i)=>{
          const n=i+1;
          const medal=n===1?'🥇':n===2?'🥈':n===3?'🥉':n;
          return `
          <div class="video-card" onclick="openVideoModalFromGrowth('${v.video_id}',${n})">
            <div class="vc-rank ${n<=3?'top3':''}">${medal}</div>
            <img class="vc-thumb" src="https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
            <div class="vc-body">
              <div class="vc-title">${v.title}</div>
              <div class="vc-meta">
                <span class="vc-stat">👁 <strong>+${fmtFull(v.period_views)}</strong>回（${growthPeriod}日）</span>
                <span class="growth-badge ${v.growth_pct>=0?'up':'down'}">${v.growth_pct>=0?'▲':'▼'}${Math.abs(v.growth_pct).toFixed(1)}%</span>
                <span class="vc-date">${fmtDate(v.published_at)}</span>
              </div>
              <div class="vc-bar-wrap"><div class="vc-bar" style="width:${Math.round(v.period_views/maxViews*100)}%"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } else {
    container.innerHTML = `<div class="no-data">
      データ収集中です。<br>
      GitHub Actions が毎日自動取得しています（${growthPeriod}日分蓄積後に表示）。<br><br>
      Analytics API を接続すると即座に表示されます。<br>
      <span style="color:var(--muted-2);font-size:11px">GitHub Secrets: REFRESH_TOKEN / OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET</span>
    </div>`;
  }
}

function calcSnapshotGained(vid_id, days, snapshots){
  if(snapshots.length < 2) return 0;
  const sorted = [...snapshots].sort((a,b)=>a.date.localeCompare(b.date));
  const latest = sorted[sorted.length-1];
  const cutoffDate = new Date(latest.date+'T00:00:00');
  cutoffDate.setDate(cutoffDate.getDate()-days);
  const cutoff = cutoffDate.toISOString().slice(0,10);
  const old = [...sorted].reverse().find(s=>s.date<=cutoff);
  if(!old) return 0;
  const latestViews = (latest.v||{})[vid_id] || 0;
  const oldViews    = (old.v||{})[vid_id]    || 0;
  return Math.max(0, latestViews - oldViews);
}

function calcSnapshotGrowth(days, snapshots){
  if(snapshots.length < 2) return {};
  const sorted = [...snapshots].sort((a,b)=>a.date.localeCompare(b.date));
  const latest = sorted[sorted.length-1];
  const cutoffDate = new Date(latest.date+'T00:00:00');
  cutoffDate.setDate(cutoffDate.getDate()-days);
  const cutoff = cutoffDate.toISOString().slice(0,10);
  const old = [...sorted].reverse().find(s=>s.date<=cutoff);
  if(!old) return {};
  const result = {};
  const latestV = latest.v || {};
  const oldV    = old.v    || {};
  for(const vid_id of Object.keys(latestV)){
    const now = latestV[vid_id]||0;
    const prev = oldV[vid_id]||0;
    if(prev > 0) result[vid_id] = (now-prev)/prev*100;
  }
  return result;
}

function openVideoModalFromGrowth(vid_id, rank){
  const v = (G.videos||[]).find(v=>v.video_id===vid_id);
  if(!v) return;
  const vp = G.video_period || {};
  const pd = (vp[String(growthPeriod)]||{})[vid_id] || {};
  openVideoModalData(v, rank, pd);
}

// ════════════════════════════════
// 今週 vs 先週タブ
// ════════════════════════════════
function getWeekDates(referenceDate, offsetWeeks){
  // referenceDate からさかのぼってその週の月〜日を返す
  const d = new Date(referenceDate+'T00:00:00');
  const dow = d.getDay(); // 0=日, 1=月...
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(d); monday.setDate(d.getDate()+mondayOffset-(offsetWeeks*7));
  const dates = [];
  for(let i=0;i<7;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);dates.push(dd.toISOString().slice(0,10));}
  return dates;
}

function renderWeekly(){
  const ad = G.analytics_daily || [];
  const daily = allDaily();
  const today = G.meta.data_through;

  // 今週・先週の日付リスト
  const thisWeek = getWeekDates(today, 0);
  const lastWeek = getWeekDates(today, 1);

  // Analytics daily Map
  const adMap = new Map(ad.map(d=>[d.date,d]));
  // fallback: snapshot diff map
  const allV = allViewData();
  const vMap = new Map(allV.map(d=>[d.date,d]));

  const getViews = (dates) => dates.map(date=>{
    if(adMap.has(date)) return adMap.get(date).views;
    return vMap.get(date)?.views||0;
  });
  const getWatchMin = (dates) => dates.map(date=>(adMap.get(date)||{}).watch_min||0);
  const getSubsGained = (dates) => dates.map(date=>(adMap.get(date)||{}).subs_gained||0);
  const getSubsLost   = (dates) => dates.map(date=>(adMap.get(date)||{}).subs_lost||0);

  const thisViews = getViews(thisWeek);
  const lastViews = getViews(lastWeek);
  const thisWatch = getWatchMin(thisWeek);
  const lastWatch = getWatchMin(lastWeek);
  const thisSubs  = getSubsGained(thisWeek).reduce((s,v)=>s+v,0);
  const lastSubs  = getSubsGained(lastWeek).reduce((s,v)=>s+v,0);
  const thisSubsL = getSubsLost(thisWeek).reduce((s,v)=>s+v,0);
  const lastSubsL = getSubsLost(lastWeek).reduce((s,v)=>s+v,0);

  const totalThis = thisViews.reduce((s,v)=>s+v,0);
  const totalLast = lastViews.reduce((s,v)=>s+v,0);
  const watchThis = thisWatch.reduce((s,v)=>s+v,0);
  const watchLast = lastWatch.reduce((s,v)=>s+v,0);
  const netSubsThis = thisSubs - thisSubsL;
  const netSubsLast = lastSubs - lastSubsL;

  const diffBadge = (a,b,fmtFn) => {
    const d=a-b, cls=d>0?'up':d<0?'down':'flat';
    return `<span class="ws-delta ${cls}">${d>=0?'▲':'▼'} ${fmtFn(Math.abs(d))}</span>`;
  };

  const wsItems = [
    {label:'今週 再生数',   thisVal:fmtFull(totalThis), diff:diffBadge(totalThis,totalLast,n=>fmtFull(n)+'回'), sub:`先週: ${fmtFull(totalLast)}回`},
    {label:'今週 視聴時間', thisVal:fmtMin(watchThis),  diff:watchThis||watchLast?diffBadge(watchThis,watchLast,n=>fmtMin(n)):'<span class="ws-delta flat">—</span>', sub:watchLast?`先週: ${fmtMin(watchLast)}`:'Analytics未接続'},
    {label:'今週 登録者増',  thisVal:(netSubsThis>=0?'+':'')+fmtFull(netSubsThis), diff:netSubsThis||netSubsLast?diffBadge(netSubsThis,netSubsLast,n=>fmtFull(n)+'人'):'<span class="ws-delta flat">—</span>', sub:netSubsLast?`先週: ${netSubsLast>=0?'+':''}${fmtFull(netSubsLast)}人`:'Analytics未接続'},
  ];

  document.getElementById('weekSummary').innerHTML = wsItems.map(it=>`
    <div class="ws-item">
      <div class="ws-label">${it.label}</div>
      <div class="ws-row"><span class="ws-val">${it.thisVal}</span>${it.diff}</div>
      <div class="ws-sub">${it.sub}</div>
    </div>`).join('');

  // 曜日ラベル
  const DOW = ['月','火','水','木','金','土','日'];
  const labels = thisWeek.map((d,i)=>DOW[i]+'('+d.slice(5)+')');

  // 再生数チャート
  const hasData = totalThis>0||totalLast>0;
  document.getElementById('weekChartNoData').style.display = hasData?'none':'block';
  document.getElementById('weekChart').style.display = hasData?'block':'none';
  if(weekChart){weekChart.destroy();weekChart=null;}
  if(hasData){
    weekChart = new Chart(document.getElementById('weekChart'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'今週',data:thisViews,backgroundColor:'rgba(91,214,138,.75)',borderWidth:0,borderRadius:4},
        {label:'先週',data:lastViews,backgroundColor:'rgba(201,162,39,.45)',borderWidth:0,borderRadius:4},
      ]},
      options:{
        ...CHART_BASE,
        plugins:{...CHART_BASE.plugins,
          legend:{display:true,labels:{color:'#8FA396',font:{size:11}}},
          tooltip:{...CHART_BASE.plugins.tooltip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtFull(ctx.raw)}回`}}
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5E726A',font:{size:11}}},
          y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#5E726A',font:{size:10},callback:v=>fmt(v)}}
        }
      }
    });
  }

  // 視聴時間チャート
  const hasWatch = watchThis>0||watchLast>0;
  document.getElementById('watchChartNoData').style.display = hasWatch?'none':'block';
  document.getElementById('watchChart').style.display = hasWatch?'block':'none';
  if(watchChart){watchChart.destroy();watchChart=null;}
  if(hasWatch){
    watchChart = new Chart(document.getElementById('watchChart'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'今週',data:thisWatch,backgroundColor:'rgba(91,166,214,.75)',borderWidth:0,borderRadius:4},
        {label:'先週',data:lastWatch,backgroundColor:'rgba(91,166,214,.3)',borderWidth:0,borderRadius:4},
      ]},
      options:{
        ...CHART_BASE,
        plugins:{...CHART_BASE.plugins,
          legend:{display:true,labels:{color:'#8FA396',font:{size:11}}},
          tooltip:{...CHART_BASE.plugins.tooltip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtMin(ctx.raw)}`}}
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5E726A',font:{size:11}}},
          y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#5E726A',font:{size:10},callback:v=>fmtMin(v)}}
        }
      }
    });
  }
}

  _rankVideos = videos;
  document.getElementById('videoRankLabel').textContent = '動画ランキング（総再生数順）';

    const vp7 = ((G.video_period||{})['7']||{})[v.video_id];

      ? `<span class="growth-badge up">▲${fmtFull(vp7.views)}回/7日</span>`

      <div class="vc-body">
        <div class="vc-title">${v.title}</div>
        <div class="vc-meta">
          <span class="vc-stat">👁 <strong>${fmt(v.views)}</strong></span>
          <span class="vc-stat">👍 <strong>${fmtFull(v.likes)}</strong></span>
          <span class="vc-stat">💬 <strong>${fmtFull(v.comments)}</strong></span>
          ${v.duration_sec?`<span class="vc-stat">🎬 <strong>${fmtDur(v.duration_sec)}</strong></span>`:''}
          ${growthBadge}
          <span class="vc-date">${fmtDate(v.published_at)}</span>
        </div>
        <div class="vc-bar-wrap"><div class="vc-bar" style="width:${Math.round(v.views/maxViews*100)}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function openVideoModal(idx){
  const v = _rankVideos[idx]; if(!v) return;
  const vp7 = ((G.video_period||{})['7']||{})[v.video_id]||{};
  openVideoModalData(v, idx+1, vp7);
}
function openVideoModalData(v, rank, pd){
  const n=rank, medal=n===1?'🥇 1位':n===2?'🥈 2位':n===3?'🥉 3位':`#${n}`;
  document.getElementById('vmodalRank').textContent = medal;
  document.getElementById('vmodalThumb').src = `https://i.ytimg.com/vi/${v.video_id}/maxresdefault.jpg`;
  document.getElementById('vmodalThumb').onerror = function(){ this.src=`https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg`; };
  document.getElementById('vmodalTitle').textContent = v.title;
  const stats = [
    {label:'総再生数', value:fmtFull(v.views)},
    {label:'高評価',   value:fmtFull(v.likes)},
    {label:'コメント', value:fmtFull(v.comments)},
  ];
  if(pd.views)     stats.push({label:'7日再生数',   value:fmtFull(pd.views)+'回'});
  if(pd.watch_min) stats.push({label:'7日視聴時間', value:fmtMin(pd.watch_min)});
  if(pd.avg_dur_sec) stats.push({label:'平均視聴時間', value:fmtDur(pd.avg_dur_sec)});
  document.getElementById('vmodalStats').innerHTML = stats.map(s=>`<div class="vmodal-stat"><div class="label">${s.label}</div><div class="value">${s.value}</div></div>`).join('');
  document.getElementById('vmodalMeta').innerHTML =
    `<span>📅 公開日: ${fmtDate(v.published_at)}</span>`+
    (v.duration_sec?`<span>⏱ 動画時間: ${fmtDur(v.duration_sec)}</span>`:'')+
    `<span>🆔 ${v.video_id}</span>`;
  document.getElementById('vmodalLink').href = `https://www.youtube.com/watch?v=${v.video_id}`;
  document.getElementById('vmodalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeVideoModal(e){
  if(e && e.target!==document.getElementById('vmodalOverlay')) return;
  document.getElementById('vmodalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeVideoModal(); });
